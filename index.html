<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="preconnect" href="https://imgchest.com">
    <link rel="dns-prefetch" href="https://imgchest.com">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Library Pro - Extreme Speed</title>
    <style>
        :root { --bg: #0a0a0a; --acc: #4caf50; --pink: #d81b60; --blue: #2196f3; --gray: #222; }
        * { box-sizing: border-box; }
        body { margin:0; font-family: 'Segoe UI', sans-serif; background:var(--bg); color:white; overflow-x:hidden; }
        
        /* Nav Principal */
        .nav { display:flex; justify-content:center; gap:15px; padding:20px; position: sticky; top: 0; background: rgba(10,10,10,0.95); z-index: 1000; border-bottom: 1px solid #222; backdrop-filter: blur(10px); }
        .t-btn { background:#1a1a1a; color:#aaa; border:1px solid #333; padding:12px 25px; border-radius:25px; cursor:pointer; transition:0.3s; font-size: 14px; font-weight: bold; }
        .t-btn.active { background:var(--acc); border-color:var(--acc); color: white; box-shadow: 0 0 15px rgba(76, 175, 80, 0.3); }

        /* Barra de Filtros */
        .f-bar { background:#141414; margin:15px auto; padding:15px; border-radius:12px; max-width:1400px; border:1px solid #333; display: flex; flex-direction: column; gap: 12px; }
        .cat-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .c-btn { background: #1a1a1a; color: #aaa; border: 1px solid #333; padding: 8px 18px; border-radius: 20px; cursor: pointer; white-space: nowrap; font-size: 12px; transition: 0.3s; }
        .c-btn.active { background: var(--blue); color: white; border-color: var(--blue); }

        /* Grid */
        .grid { display:grid; gap:15px; padding:20px; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); max-width: 1600px; margin: 0 auto; }
        
        /* Cards Optimizado */
        .card { background:#161616; border:1px solid #333; border-radius:10px; overflow:hidden; text-align:center; cursor: pointer; position: relative; transition: 0.3s; text-decoration: none; color: white; display: flex; flex-direction: column; content-visibility: auto; contain-intrinsic-size: 200px 300px; }
        .card:hover { border-color: var(--acc); transform: translateY(-5px); }
        
        .card img { 
            width:100%; 
            height:280px; 
            object-fit:cover; 
            display:block; 
            transition: opacity 0.4s ease-in-out; 
            background: #111; /* Color previo a la carga */
        }
        
        .img-loading { opacity: 0; }
        .img-loaded { opacity: 1; }

        .card span { display:block; padding:12px; font-size:12px; font-weight: bold; background: #161616; border-top: 1px solid #222; flex-grow: 1; display: flex; align-items: center; justify-content: center; }

        /* Álbumes */
        .album-card { height: 320px; justify-content: flex-end; background-size: cover; background-position: center; }
        .badge { position: absolute; top: 10px; right: 10px; background: var(--blue); color: white; padding: 4px 10px; border-radius: 12px; font-size: 10px; font-weight: bold; z-index: 2; }
        .album-title { background: rgba(0,0,0,0.85); padding: 12px; border-top: 1px solid var(--acc); font-size: 13px; font-weight: bold; width: 100%; backdrop-filter: blur(5px); }

        /* Fabs */
        .fab-container { position: fixed; bottom: 25px; right: 25px; display: none; flex-direction: column; gap: 12px; z-index: 2000; }
        .fab { border: none; padding: 15px 25px; border-radius: 30px; color: white; font-weight: bold; cursor: pointer; box-shadow: 0 5px 20px rgba(0,0,0,0.6); }

        /* Modal */
        #modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.98); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:5000; }
        #modal img { max-width:98%; max-height:88vh; object-fit:contain; }
        .m-nav { position:absolute; bottom:30px; width:100%; display:flex; justify-content:center; gap:15px; }

        .hidden { display:none !important; }
        .selected { border: 2px solid var(--pink) !important; box-shadow: 0 0 15px var(--pink); }

        @media (max-width: 600px) {
            #g-grid { grid-template-columns: repeat(4, 1fr) !important; gap: 5px !important; padding: 10px !important; }
            #g-grid .card img { height: 120px !important; }
            #g-grid .album-card { height: 150px !important; }
            #g-grid .card span, #g-grid .album-title { font-size: 9px !important; padding: 5px !important; }
            #g-grid .badge { font-size: 8px !important; padding: 2px 5px !important; top: 5px !important; right: 5px !important; }
        }
    </style>
</head>
<body>

    <div class="nav">
        <button class="t-btn active" onclick="tab('mangas',this)">📚 Mis Mangas</button>
        <button class="t-btn" onclick="tab('galeria',this)">🖼️ Ilustraciones</button>
        <button class="t-btn" onclick="tab('animes',this)">📺 Animes</button>
    </div>

    <div id="t-mangas">
        <div class="f-bar">
            <input type="text" placeholder="Buscar manga..." style="width:100%; padding:12px; background:#111; color:white; border:1px solid #333; border-radius:8px;" oninput="loadMangas(this.value)">
        </div>
        <div id="m-grid" class="grid"></div>
    </div>

    <div id="t-galeria" class="hidden">
        <div class="f-bar">
            <input type="text" id="gSearch" placeholder="Buscar..." style="width:100%; padding:12px; background:#111; color:white; border:1px solid #333; border-radius:8px;" oninput="renderAlbums(this.value)">
            <div class="cat-row" id="catFilters">
                <button class="c-btn active" onclick="filterCat('TODOS', this)">Todos</button>
                <button class="c-btn" onclick="filterCat('Anime_Manga', this)">Anime/Manga</button>
                <button class="c-btn" onclick="filterCat('Juegos', this)">Juegos</button>
                <button class="c-btn" onclick="filterCat('Comic', this)">Comic</button>
                <button class="c-btn" onclick="filterCat('Real', this)">Real</button>
                <button class="c-btn" onclick="filterCat('Variados', this)">Variados</button>
            </div>
        </div>
        <div class="fab-container" id="g-fabs">
            <button class="fab" style="background:var(--pink);" onclick="openM()" id="viewBtn">👁️ Ver (0)</button>
            <button class="fab" style="background:#f44336;" onclick="clearSel()">🧹 Limpiar</button>
        </div>
        <div id="g-grid" class="grid"></div>
    </div>

    <div id="t-animes" class="hidden">
        <div class="f-bar"><input type="text" placeholder="Buscar anime..." style="width:100%; padding:12px; background:#111; color:white; border:1px solid #333; border-radius:8px;" oninput="searchGeneric(this.value, 'a-grid')"></div>
        <div id="a-grid" class="grid"></div>
    </div>

    <div id="modal" onclick="if(event.target===this) closeM()">
        <button style="position:absolute; top:20px; right:20px; background:none; border:none; color:white; font-size:35px;" onclick="closeM()">✕</button>
        <img id="m-img" src="">
        <div class="m-nav">
            <button class="t-btn" onclick="changeM(-1)">❮</button>
            <button class="t-btn" id="playBtn" onclick="togglePlay()">▶ Auto</button>
            <button class="t-btn" onclick="changeM(1)">❯</button>
        </div>
    </div>

    <script src="lista_mangas.js"></script>
    <script src="lista_imagenes.js"></script>
    <script src="lista_animes.js"></script> 
    <script>
    let db = [], selectedDB = new Map(), curIdx = 0, currentView = 'albums', playInt = null, activeCat = 'TODOS';

    /* === MOTOR DE CARGA PROFESIONAL (Intersection Observer) === */
    const observerOptions = { rootMargin: '0px 0px 600px 0px' }; // Carga 600px antes de llegar
    const imageObserver = new IntersectionObserver((entries, observer) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                const img = entry.target;
                img.src = img.dataset.src; // Cargar link real de ImgChest
                img.onload = () => img.classList.add('img-loaded');
                observer.unobserve(img);
            }
        });
    }, observerOptions);

    function createLazyImg(src, alt) {
        const img = document.createElement('img');
        img.className = 'img-loading';
        img.dataset.src = src;
        img.alt = alt;
        img.decoding = 'async'; // Decodificación asíncrona
        img.src = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lMREFUeNoFwQEBAAAAgl0A/gl1UwVNAAACR0lEQVR42mP8/x8AAwMCAO+ip1sAAAAASUVORK5CYII="; // Placeholder 1x1 transparente
        imageObserver.observe(img);
        return img;
    }

    function tab(t, b) {
        document.getElementById('t-mangas').classList.toggle('hidden', t !== 'mangas');
        document.getElementById('t-galeria').classList.toggle('hidden', t !== 'galeria');
        document.getElementById('t-animes').classList.toggle('hidden', t !== 'animes');
        document.getElementById('g-fabs').style.display = (t === 'galeria') ? 'flex' : 'none';
        document.querySelectorAll('.nav .t-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        if (t === 'galeria' && db.length === 0) loadG();
        if (t === 'animes') loadAnimes();
    }

    function loadMangas(filter = "") {
        const grid = document.getElementById('m-grid');
        grid.innerHTML = '';
        if (typeof bibliotecaMangas === 'undefined') return;

        const seriesMap = {};
        Object.keys(bibliotecaMangas).forEach(key => {
            const baseName = key.split(/_ch|_Vol/i)[0].replace(/_/g, ' ');
            const isSubChapter = key.includes('_ch') || key.includes('_Vol');
            if (!seriesMap[baseName]) {
                seriesMap[baseName] = { nombre: baseName, caps: [], portada: bibliotecaMangas[key][0] };
            }
            seriesMap[baseName].caps.push({
                originalKey: key,
                label: isSubChapter ? `Capítulo ${key.split(/_ch|_Vol/i)[1]}` : "Completo",
                link: `reader.html?manga=${key}`
            });
        });

        Object.values(seriesMap).sort((a,b) => a.nombre.localeCompare(b.nombre)).forEach(serie => {
            if (filter && !serie.nombre.toLowerCase().includes(filter.toLowerCase())) return;

            const card = document.createElement('div');
            const hasMultiple = serie.caps.length > 1;
            card.className = 'card';
            
            const img = createLazyImg(serie.portada, serie.nombre);
            const badge = hasMultiple ? `<div class="badge" style="background:var(--pink)">${serie.caps.length} Caps</div>` : '';
            const span = document.createElement('span');
            span.innerText = serie.nombre;

            card.innerHTML = badge;
            card.appendChild(img);
            card.appendChild(span);

            card.onclick = () => {
                if (hasMultiple) renderExpandedSerie(serie);
                else window.location.href = serie.caps[0].link;
            };
            grid.appendChild(card);
        });
    }

    function renderExpandedSerie(serie) {
        const grid = document.getElementById('m-grid');
        grid.innerHTML = `
            <div class="card" style="grid-column: 1/-1; height: 60px; background: var(--pink); display:flex; align-items:center; justify-content:center; font-weight:bold; flex-direction:row;" onclick="loadMangas()">
                ⬅ Volver a Biblioteca
            </div>
        `;

        serie.caps.sort((a,b) => a.label.localeCompare(b.label, undefined, {numeric: true})).forEach(cap => {
            const card = document.createElement('div');
            card.className = 'card';
            const img = createLazyImg(bibliotecaMangas[cap.originalKey][0], serie.nombre);
            const span = document.createElement('span');
            span.innerText = `${serie.nombre} - ${cap.label}`;
            
            card.appendChild(img);
            card.appendChild(span);
            card.onclick = () => window.location.href = cap.link;
            grid.appendChild(card);
        });
        window.scrollTo(0,0);
    }

    function loadG() {
        db = [];
        if (typeof galeria_maestra === 'undefined') return;
        for (let [categoria, personajes] of Object.entries(galeria_maestra)) {
            for (let [nombre, links] of Object.entries(personajes)) {
                links.forEach(url => {
                    let grupoID = (categoria === 'Real') ? `img_real_${url}` : nombre;
                    db.push({ r: url, p: nombre, sub: categoria, g: grupoID });
                });
            }
        }
        db.sort((a, b) => a.p.localeCompare(b.p));
        renderAlbums();
    }

    function filterCat(cat, btn) {
        activeCat = cat;
        document.querySelectorAll('.c-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderAlbums(document.getElementById('gSearch').value);
    }

    function renderAlbums(filter = "") {
        const grid = document.getElementById('g-grid');
        grid.innerHTML = '';
        const groups = [...new Set(db.map(i => i.g))].sort((a, b) => a.localeCompare(b));
        groups.forEach(g => {
            const groupData = db.filter(i => i.g === g);
            const item = groupData[0];
            const matchBusqueda = item.p.toLowerCase().includes(filter.toLowerCase().replace(/ /g, '_'));
            const matchCat = (activeCat === 'TODOS' || item.sub === activeCat);

            if (matchBusqueda && matchCat) {
                const card = document.createElement('div');
                if (item.sub === 'Real') {
                    card.className = 'card' + (selectedDB.has(item.r) ? ' selected' : '');
                    const img = createLazyImg(item.r, item.p);
                    const span = document.createElement('span');
                    span.innerText = item.p.replace(/_/g, ' ');
                    card.appendChild(img);
                    card.appendChild(span);
                    card.onclick = () => toggleSelection(item, card);
                } else {
                    card.className = 'card album-card';
                    card.style.backgroundImage = `url('${item.r}')`;
                    card.innerHTML = `<div class="badge">${groupData.length} fotos</div><div class="album-title">${item.p.replace(/_/g, ' ')}</div>`;
                    card.onclick = () => { history.pushState({view: 'images'}, ""); renderImages(g); };
                }
                grid.appendChild(card);
            }
        });
    }

    function renderImages(groupName) {
        const grid = document.getElementById('g-grid');
        grid.innerHTML = `<div class="card album-card" style="height:80px; background:var(--pink); justify-content:center; flex-direction:row; align-items:center;" onclick="history.back()"><span style="border-top:none; background:transparent;">⬅ Volver</span></div>`;
        db.filter(i => i.g === groupName).forEach(item => {
            const card = document.createElement('div');
            card.className = 'card' + (selectedDB.has(item.r) ? ' selected' : '');
            
            const img = createLazyImg(item.r, item.p);
            const span = document.createElement('span');
            span.innerText = item.p.replace(/_/g, ' ');
            
            card.appendChild(img);
            card.appendChild(span);
            card.onclick = () => toggleSelection(item, card);
            grid.appendChild(card);
        });
        window.scrollTo(0,0);
    }

    function toggleSelection(item, card) {
        if (selectedDB.has(item.r)) { selectedDB.delete(item.r); card.classList.remove('selected'); }
        else { selectedDB.set(item.r, item); card.classList.add('selected'); }
        document.getElementById('viewBtn').innerText = `👁️ Ver (${selectedDB.size})`;
    }

    function searchGeneric(q, id) {
        const container = document.getElementById(id);
        const cards = Array.from(container.querySelectorAll('.card'));
        cards.forEach(c => c.classList.toggle('hidden', !c.innerText.toLowerCase().includes(q.toLowerCase())));
        cards.filter(c => !c.classList.contains('hidden'))
             .sort((a, b) => a.innerText.localeCompare(b.innerText))
             .forEach(c => container.appendChild(c));
    }

    function loadAnimes() {
        const container = document.getElementById('a-grid');
        if (container.children.length > 0 || typeof lista_animes === 'undefined') return;
        Object.entries(lista_animes).sort((a, b) => a[0].localeCompare(b[0])).forEach(([n, url]) => {
            const a = document.createElement('a');
            a.className = 'card'; a.href = url; a.target = '_blank';
            a.innerHTML = `<span>${n.replace(/_/g, ' ')}</span>`;
            container.appendChild(a);
        });
    }

    window.onpopstate = () => {
        if (document.getElementById('modal').style.display === 'flex') closeM(false);
        else renderAlbums();
    };

    function openM() { 
        if(selectedDB.size === 0) return;
        curIdx = 0; history.pushState({view: 'modal'}, "");
        document.getElementById('modal').style.display = 'flex'; updM(); 
    }
    function closeM(push = true) { 
        clearInterval(playInt); playInt = null;
        document.getElementById('modal').style.display = 'none'; 
        if(push) history.back();
    }
    function updM() { document.getElementById('m-img').src = Array.from(selectedDB.values())[curIdx].r; }
    function changeM(d) { const s = selectedDB.size; curIdx = (curIdx + d + s) % s; updM(); }
    function togglePlay() {
        if (playInt) { clearInterval(playInt); playInt = null; document.getElementById('playBtn').innerText = "▶ Auto"; }
        else { playInt = setInterval(() => changeM(1), 5000); document.getElementById('playBtn').innerText = "⏸ Stop"; }
    }
    function clearSel() {
        selectedDB.clear();
        document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
        document.getElementById('viewBtn').innerText = `👁️ Ver (0)`;
    }

    window.onload = () => { loadMangas(); };
    </script>
</body>
</html>
