<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Manga Library & Gallery - Pro v3</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { 
            --bg-dark: #0f0f0f; 
            --accent: #4caf50; 
            --error: #f44336; 
            --glass: rgba(25,25,25,0.95); 
            --card-scale: 1; /* Variable para el zoom */
        }
        body { margin:0; font-family:'Segoe UI',Roboto,sans-serif; background:var(--bg-dark); color:white; min-height:100vh; overflow-x:hidden; transition: 0.3s; }
        
        /* PANEL DE CONTROL (Sidebar de la imagen) */
        #controlPanel {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: #000;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 3000;
            width: 120px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        .panel-info { text-align: center; font-size: 13px; margin-bottom: 5px; color: #ccc; }
        .panel-btn {
            background: #222;
            color: white;
            border: 1px solid #444;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
        }
        .panel-btn:hover { background: #333; border-color: var(--accent); }
        .panel-btn i { font-style: normal; }

        /* NAVEGACIÓN Y TABS */
        h1 { text-align:center; margin:20px 0; font-weight:300; letter-spacing:2px; }
        .tab-nav { display:flex; justify-content:center; gap:12px; margin-bottom:20px; }
        .tab-btn { background:#222; color:white; border:1px solid #444; padding:10px 20px; border-radius:30px; cursor:pointer; font-weight:bold; transition: 0.3s; }
        .tab-btn.active { background:var(--accent); border-color:var(--accent); }

        /* CONTENEDOR Y FILTROS */
        .content-container { max-width: 1400px; margin: 0 auto; padding: 0 20px; transition: 0.3s; }
        
        /* Filtros más compactos para que no estorben */
        .filter-bar { 
            background: var(--glass); 
            padding: 12px; 
            border-radius: 12px; 
            margin-bottom: 15px; 
            border: 1px solid #444; 
            position: sticky; 
            top: 10px; 
            z-index: 100;
        }
        .search-input { width:100%; padding:8px; margin-bottom:10px; border-radius:6px; border:1px solid #444; background:#111; color:white; }
        
        .filter-group { 
            display:flex; flex-wrap:wrap; gap:6px; 
            max-height: 70px; /* Muy compacto con scroll */
            overflow-y: auto; padding: 5px;
        }
        .filter-label { font-size: 10px; color: var(--accent); text-transform: uppercase; font-weight: bold; margin-bottom: 4px; }
        .btn-filter { background:#333; color:#eee; border:1px solid #444; padding:4px 8px; border-radius:4px; cursor:pointer; font-size:11px; }
        .btn-filter.active { background:var(--accent); border-color: var(--accent); }

        /* LISTAS Y CARDS (Con Zoom Dinámico) */
        .manga-list, .gallery-grid { 
            display:grid; 
            gap:15px; 
            padding-bottom:100px; 
            transform: scale(var(--card-scale));
            transform-origin: top center;
        }
        .manga-list { grid-template-columns: repeat(auto-fill, minmax(calc(200px * var(--card-scale)), 1fr)); }
        .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(calc(240px * var(--card-scale)), 1fr)); }

        .manga-card, .img-card { background:#1a1a1a; border-radius:10px; border:1px solid #333; text-decoration:none; color:white; overflow:hidden; transition: 0.2s; }
        .manga-card { padding:15px; text-align:center; min-height:50px; display:flex; align-items:center; justify-content:center; }
        .img-card img { width:100%; height:260px; object-fit:cover; display:block; }
        .img-card .info { padding:6px; font-size:10px; text-align:center; color:#666; }
        .img-card.selected { border:2px solid var(--accent); opacity: 0.6; }

        /* LIGHTBOX */
        #lightbox { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.97); display:none; justify-content:center; align-items:center; z-index:4000; }
        #lightbox img { max-height: 95vh; max-width: 95vw; object-fit: contain; }

        /* UTILS */
        .hidden-ui { display: none !important; }
        .double-grid { grid-template-columns: 1fr 1fr !important; }
    </style>
</head>
<body>

    <div id="controlPanel">
        <div class="panel-info" id="pageCounter">Item 1 / 0</div>
        <button class="panel-btn" onclick="window.scrollTo({top:0, behavior:'smooth'})">⬆️ Arriba</button>
        <button class="panel-btn" onclick="window.scrollTo({top:document.body.scrollHeight, behavior:'smooth'})">⬇️ Abajo</button>
        <button class="panel-btn" onclick="adjustZoom(0.1)">🔍 +</button>
        <button class="panel-btn" onclick="adjustZoom(-0.1)">🔍 -</button>
        <button class="panel-btn" onclick="resetZoom()">📐 Fit</button>
        <button class="panel-btn" onclick="toggleDouble()">📖 Doble</button>
        <button class="panel-btn" onclick="toggleUI()">👁️ Ocultar UI</button>
        <button class="panel-btn" onclick="location.reload()">⬅️ Volver</button>
    </div>

    <h1>📚 My Library</h1>

    <div class="tab-nav" id="mainTabs">
        <button class="tab-btn active" onclick="showTab('mangas', this)">Mis Mangas</button>
        <button class="tab-btn" onclick="showTab('galeria', this)">Ilustraciones</button>
    </div>

    <div class="content-container">
        
        <div id="tab-mangas" class="tab-content">
            <div class="filter-bar" id="mangaFilters">
                <input type="text" class="search-input" placeholder="Buscar manga..." oninput="filterList('mangaContainer', this.value)">
            </div>
            <div id="mangaContainer" class="manga-list">
                <a class="manga-card" href="reader.html?manga=Francis_X_Raikou">Francis X Raikou</a>
                <a class="manga-card" href="reader.html?manga=Yang_Gui_Fei_X_Prota">Yang Gui Fei X Prota</a>
                <div style="grid-column: 1/-1; border-top:1px dashed #333; margin-top:10px; padding-top:10px; text-align:center; color:var(--accent)">FUTANARIJIMA</div>
                <a class="manga-card" href="reader.html?manga=Futanarijima_ch1">Capítulo 1</a>
                <a class="manga-card" href="reader.html?manga=Futanarijima_ch2">Capítulo 2</a>
            </div>
        </div>

        <div id="tab-galeria" class="tab-content" style="display:none;">
            <div class="filter-bar" id="galleryFilters">
                <input type="text" class="search-input" placeholder="Buscar personaje (Merge activo)..." oninput="applyGalleryFilters()">
                <div class="filter-label">Sección</div>
                <div id="cat-filters" class="filter-group"></div>
                <div class="filter-label">Personaje</div>
                <div id="pj-filters" class="filter-group"></div>
            </div>
            <div id="galleryGrid" class="gallery-grid"></div>
        </div>
    </div>

    <div id="lightbox" onclick="this.style.display='none'">
        <img id="fullImage" src="">
    </div>

    <script src="lista_imagenes.js"></script>
    <script>
        let galleryData = [];
        let currentZoom = 1;
        let filterCat='Todos', filterPj='Todos', selectedImages=[];

        // LÓGICA DE DATOS (Merge & Unify)
        function buildData() {
            galleryData = [];
            const procesar = (obj, cat) => {
                if (!obj) return;
                for (let [pj, links] of Object.entries(obj)) {
                    let pjUnificado = pj.split(/[ _]/)[0]; // Merge por primera palabra
                    links.forEach(url => galleryData.push({ ruta: url, pj: pjUnificado, cat: cat }));
                }
            };
            procesar(lista_ilustraciones, "Ilustraciones");
            procesar(lista_real, "Realista");
            procesar(lista_rule34, "Rule34");
            updateCounter(1, galleryData.length);
        }

        // FUNCIONES DEL PANEL DE CONTROL (LA IMAGEN)
        function adjustZoom(delta) {
            currentZoom = Math.min(Math.max(0.5, currentZoom + delta), 1.5);
            document.documentElement.style.setProperty('--card-scale', currentZoom);
        }
        function resetZoom() {
            currentZoom = 1;
            document.documentElement.style.setProperty('--card-scale', 1);
        }
        function toggleDouble() {
            document.getElementById('mangaContainer').classList.toggle('double-grid');
            document.getElementById('galleryGrid').classList.toggle('double-grid');
        }
        function toggleUI() {
            document.getElementById('mainTabs').classList.toggle('hidden-ui');
            document.getElementById('mangaFilters').classList.toggle('hidden-ui');
            document.getElementById('galleryFilters').classList.toggle('hidden-ui');
            document.querySelector('h1').classList.toggle('hidden-ui');
        }
        function updateCounter(current, total) {
            document.getElementById('pageCounter').innerText = `Item ${current} / ${total}`;
        }

        // TABS Y GALERÍA
        function showTab(t, b) {
            document.querySelectorAll('.tab-content').forEach(x => x.style.display='none');
            document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
            document.getElementById('tab-'+t).style.display='block';
            b.classList.add('active');
            if(t==='galeria') renderGallery();
        }

        function renderGallery() {
            const g = document.getElementById('galleryGrid'); g.innerHTML = '';
            galleryData.forEach((img, idx) => {
                const c = document.createElement('div');
                c.className = 'img-card';
                c.innerHTML = `<img src="${img.ruta}" loading="lazy"><div class="info">${img.pj}</div>`;
                c.dataset.pj = img.pj;
                c.dataset.cat = img.cat;
                c.onclick = () => { 
                    document.getElementById('fullImage').src = img.ruta;
                    document.getElementById('lightbox').style.display = 'flex';
                    updateCounter(idx + 1, galleryData.length);
                };
                g.appendChild(c);
            });
            renderFilters();
            applyGalleryFilters();
        }

        function renderFilters() {
            const cats = [...new Set(galleryData.map(i=>i.cat))];
            const pjs = [...new Set(galleryData.map(i=>i.pj))].sort();
            
            const renderBtns = (id, list, curr, type) => {
                const con = document.getElementById(id); con.innerHTML = '';
                ['Todos', ...list].forEach(item => {
                    const b = document.createElement('button');
                    b.innerText = item; b.className = 'btn-filter' + (item===curr?' active':'');
                    b.onclick = () => { 
                        if(type==='cat') filterCat = item; else filterPj = item;
                        renderFilters(); applyGalleryFilters();
                    };
                    con.appendChild(b);
                });
            };
            renderBtns('cat-filters', cats, filterCat, 'cat');
            renderBtns('pj-filters', pjs, filterPj, 'pj');
        }

        function applyGalleryFilters() {
            const term = document.querySelector('#tab-galeria .search-input').value.toLowerCase();
            let count = 0;
            document.querySelectorAll('.img-card').forEach(c => {
                const mC = filterCat==='Todos' || c.dataset.cat===filterCat;
                const mP = filterPj==='Todos' || c.dataset.pj===filterPj;
                const mT = term==='' || c.dataset.pj.toLowerCase().includes(term);
                const isVis = mC && mP && mT;
                c.style.display = isVis ? 'block' : 'none';
                if(isVis) count++;
            });
            updateCounter(1, count);
        }

        function filterList(id, term) {
            let count = 0;
            document.querySelectorAll(`#${id} .manga-card`).forEach(c => {
                const isVis = c.innerText.toLowerCase().includes(term.toLowerCase());
                c.style.display = isVis ? 'flex' : 'none';
                if(isVis) count++;
            });
            updateCounter(1, count);
        }

        window.onload = buildData;
    </script>
</body>
</html>
