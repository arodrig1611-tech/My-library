<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Manga Library & Gallery - Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --bg-dark: #0f0f0f; --accent: #4caf50; --error: #f44336; --glass: rgba(25,25,25,0.9); }
        body { margin:0; font-family:'Segoe UI',Roboto,sans-serif; background:var(--bg-dark); color:white; min-height:100vh; overflow-x:hidden; }
        h1 { text-align:center; margin:30px 0; font-weight:300; letter-spacing:2px; }
        
        /* Navegación por Pestañas */
        .tab-nav { display:flex; justify-content:center; gap:12px; margin-bottom:25px; }
        .tab-btn { background:#222; color:white; border:1px solid #444; padding:12px 24px; border-radius:30px; cursor:pointer; font-size:16px; font-weight:bold; transition: 0.3s; }
        .tab-btn.active { background:var(--accent); border-color:var(--accent); box-shadow:0 0 15px rgba(76,175,80,0.3); }
        
        /* Listas y Grillas */
        .manga-list { max-width:1100px; margin:0 auto; display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:20px; padding:20px; }
        .manga-card { text-decoration:none; color:white; background:#1a1a1a; padding:20px; border-radius:15px; text-align:center; border:1px solid #333; transition:0.3s; display:flex; align-items:center; justify-content:center; min-height:80px; font-weight: 500; }
        .manga-card:hover { transform:translateY(-5px); border-color:var(--accent); background:#222; }

        .futanari-section { grid-column: 1 / -1; background: rgba(255,255,255,0.03); padding: 25px; border-radius: 20px; border: 1px dashed #444; margin-top: 15px; }
        .futanari-title { margin: 0 0 20px 0; font-size: 20px; color: var(--accent); text-align: center; text-transform: uppercase; letter-spacing: 1px; }
        .chapter-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }

        /* Galería */
        .gallery-container { max-width:1500px; margin:0 auto; padding:0 20px; }
        .filter-bar { background:var(--glass); backdrop-filter:blur(15px); padding:20px; border-radius:15px; margin-bottom:20px; border:1px solid #444; position:sticky; top:10px; z-index:100; }
        #searchBox { width:100%; padding:12px; margin-bottom:20px; border-radius:10px; border:1px solid #444; background:#111; color:white; font-size:16px; outline:none; box-sizing: border-box; }
        .filter-group { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:15px; max-height:150px; overflow-y:auto; padding:5px; border-bottom: 1px solid #333; }
        .filter-label { width:100%; font-size:12px; color:var(--accent); text-transform:uppercase; margin-bottom:8px; font-weight:bold; opacity: 0.8; }
        .btn-filter { background:#333; color:#eee; border:1px solid #444; padding:6px 12px; border-radius:8px; cursor:pointer; font-size:13px; transition:0.2s; }
        .btn-filter.active { background:var(--accent); color:white; border-color: var(--accent); }
        
        .gallery-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:15px; padding-bottom:120px; }
        .img-card { background:#161616; border-radius:10px; overflow:hidden; border:1px solid #333; cursor:pointer; transition: 0.3s; }
        .img-card img { width:100%; height:300px; object-fit:cover; display:block; }
        .img-card .info { padding:10px; font-size:11px; text-align:center; color:#777; background:#1a1a1a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .img-card.selected { border:2px solid var(--accent); transform: scale(0.98); opacity: 0.6; }

        /* Lightbox */
        #lightbox { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:none; justify-content:center; align-items:center; z-index:3000; }
        #lightbox img { max-width:90%; max-height:90%; object-fit:contain; border-radius: 5px; }
        .nav-btn { position:absolute; top:50%; transform:translateY(-50%); background:rgba(255,255,255,0.05); color:white; border:none; font-size:30px; padding:15px; cursor:pointer; border-radius:50%; }
        #prevBtn { left:20px; } #nextBtn { right:20px; }
        #closeBtn { position:absolute; top:20px; right:20px; font-size:40px; color:white; cursor:pointer; background:none; border:none; }

        #menuUI { position:fixed; bottom:20px; right:20px; background:var(--glass); backdrop-filter:blur(10px); padding:12px; border-radius:12px; z-index:2000; display:flex; gap:10px; border:1px solid #444; }
        .ui-btn { background:#444; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:bold; font-size: 14px; }
        #viewSelectedBtn { display:none; background:var(--accent); }
    </style>
</head>
<body>

    <h1>📚 My Digital Library</h1>

    <div class="tab-nav">
        <button class="tab-btn active" onclick="showTab('mangas', this)">Mis Mangas</button>
        <button class="tab-btn" onclick="showTab('galeria', this)">Ilustraciones</button>
    </div>

    <div id="tab-mangas" class="tab-content">
        <div class="manga-list">
            <a class="manga-card" href="reader.html?manga=Francis_X_Raikou">Francis X Raikou</a>
            <a class="manga-card" href="reader.html?manga=Yang_Gui_Fei_X_Prota">Yang Gui Fei X Prota</a>
            <a class="manga-card" href="reader.html?manga=Ibuki_X_Yui">Ibuki X Yui</a>
            <a class="manga-card" href="reader.html?manga=BB_X_Prota">BB X Prota</a>
            <a class="manga-card" href="reader.html?manga=Jalter_X_Apocrypha_NPC">Jalter X Apocrypha NPC</a>

            <div class="futanari-section">
                <h3 class="futanari-title">Futanarijima</h3>
                <div class="chapter-grid">
                    <a class="manga-card" href="reader.html?manga=Futanarijima_ch1">Ch. 1</a>
                    <a class="manga-card" href="reader.html?manga=Futanarijima_ch2">Ch. 2</a>
                    <a class="manga-card" href="reader.html?manga=Futanarijima_ch3">Ch. 3</a>
                    <a class="manga-card" href="reader.html?manga=Futanarijima_ch4">Ch. 4</a>
                    <a class="manga-card" href="reader.html?manga=Futanarijima_ch5">Ch. 5</a>
                    <a class="manga-card" href="reader.html?manga=Futanarijima_ch6">Ch. 6</a>
                </div>
            </div>
        </div>
    </div>

    <div id="tab-galeria" class="tab-content" style="display:none;">
        <div class="gallery-container">
            <div id="stats">Mostrando: 0 / Total: 0</div>
            <div class="filter-bar">
                <input type="text" id="searchBox" placeholder="Buscar personaje o archivo..." oninput="applyFilters()">
                
                <div class="filter-label">Sección</div>
                <div id="cat-filters" class="filter-group"></div>
                
                <div class="filter-label">Personaje (Merge Activo)</div>
                <div id="pj-filters" class="filter-group"></div>
            </div>
            <div id="galleryGrid" class="gallery-grid"></div>
        </div>
    </div>

    <div id="lightbox">
        <button id="closeBtn" onclick="closeLightbox()">&times;</button>
        <button id="prevBtn" class="nav-btn" onclick="changeImage(-1)">❮</button>
        <img id="fullImage" src="">
        <button id="nextBtn" class="nav-btn" onclick="changeImage(1)">❯</button>
    </div>

    <div id="menuUI">
        <button id="clearSelectedBtn" class="ui-btn" style="display:none;" onclick="clearAllSelection()">Limpiar</button>
        <button id="viewSelectedBtn" class="ui-btn" onclick="openCarousel()">Ver (0)</button>
    </div>

    <script src="lista_imagenes.js"></script>
    <script>
        let galleryData = [];
        let filterCat='Todos', filterPj='Todos', selectedImages=[], currentIndex=0;

        // --- LÓGICA DE MERGE Y PROCESAMIENTO ---
        function buildGalleryData() {
    galleryData = [];
    
    const procesar = (obj, catName) => {
        if (typeof obj === 'undefined') return;
        for (let [pj, links] of Object.entries(obj)) {
            
            // --- LÓGICA DE UNIFICACIÓN ---
            // Esto quita "R34", "_2B" o cualquier sufijo después de un espacio o guion bajo
            // para que "TwoB R34" y "TwoB 2B" se conviertan ambos en "TwoB"
            let pjUnificado = pj.split(/[ _]/)[0]; 

            links.forEach(url => {
                galleryData.push({
                    ruta: url,
                    archivo: url.split('/').pop(),
                    pj: pjUnificado, // Usamos el nombre unificado para el filtro
                    pjOriginal: pj,  // Guardamos el original por si acaso
                    categoria: catName
                });
            });
        }
    };

    procesar(lista_ilustraciones, "Ilustraciones");
    procesar(lista_real, "Realista");
    procesar(lista_rule34, "Rule34");
}

        function showTab(t, b) {
            document.querySelectorAll('.tab-content').forEach(x=>x.style.display='none');
            document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
            document.getElementById('tab-'+t).style.display='block'; 
            b.classList.add('active');
            if(t==='galeria') initGallery();
        }

        function initGallery() {
            buildGalleryData(); // Sincroniza datos antes de renderizar
            const g = document.getElementById('galleryGrid'); 
            g.innerHTML = ''; 
            
            galleryData.forEach(img => {
                const c = document.createElement('div'); 
                c.className = 'img-card' + (selectedImages.includes(img.ruta) ? ' selected' : '');
                c.innerHTML = `<img src="${img.ruta}" loading="lazy"><div class="info">${img.pj} - ${img.archivo}</div>`;
                
                // Guardamos metadatos en el elemento para filtrar rápido
                c.dataset.cat = img.categoria;
                c.dataset.pj = img.pj;
                c.dataset.name = img.archivo.toLowerCase();
                
                c.onclick = () => toggleSelect(img.ruta, c); 
                g.appendChild(c);
            });
            updateFiltersUI(); 
            applyFilters();
        }

        function updateFiltersUI() {
            const categorias = [...new Set(galleryData.map(i=>i.categoria))];
            const personajes = [...new Set(galleryData.map(i=>i.pj))].sort();

            renderBtn('cat-filters', categorias, filterCat, v => {filterCat=v; applyFilters(); updateFiltersUI();});
            renderBtn('pj-filters', personajes, filterPj, v => {filterPj=v; applyFilters(); updateFiltersUI();});
        }

        function renderBtn(id, list, current, callback) {
            const container = document.getElementById(id);
            container.innerHTML = '';
            ['Todos', ...list].forEach(item => { 
                const b = document.createElement('button');
                b.innerText = item.replace(/_/g, ' '); 
                b.className = 'btn-filter' + (item === current ? ' active' : '');
                b.onclick = () => callback(item);
                container.appendChild(b); 
            });
        }

        function applyFilters() {
            const term = document.getElementById('searchBox').value.toLowerCase();
            let visibleCount = 0; 
            
            document.querySelectorAll('.img-card').forEach(card => {
                const matchCat = filterCat === 'Todos' || card.dataset.cat === filterCat;
                const matchPj = filterPj === 'Todos' || card.dataset.pj === filterPj;
                const matchSearch = term === '' || 
                                    card.dataset.name.includes(term) || 
                                    card.dataset.pj.toLowerCase().includes(term);

                const isVisible = matchCat && matchPj && matchSearch;
                card.style.display = isVisible ? 'block' : 'none'; 
                if(isVisible) visibleCount++;
            });
            document.getElementById('stats').innerText = `Mostrando: ${visibleCount} / Total: ${galleryData.length}`;
        }

        function toggleSelect(ruta, element) {
            const index = selectedImages.indexOf(ruta);
            if(index > -1) {
                selectedImages.splice(index, 1);
                element.classList.remove('selected');
            } else {
                if(selectedImages.length < 20) { // Aumenté el límite para que puedas ver más en el carrusel
                    selectedImages.push(ruta);
                    element.classList.add('selected');
                } else {
                    alert("Límite de 20 imágenes alcanzado");
                }
            }
            updateUIButtons();
        }

        function clearAllSelection() {
            selectedImages = []; 
            document.querySelectorAll('.img-card').forEach(c => c.classList.remove('selected')); 
            updateUIButtons();
        }

        function updateUIButtons() {
            const vBtn = document.getElementById('viewSelectedBtn');
            const cBtn = document.getElementById('clearSelectedBtn');
            vBtn.innerText = `Ver (${selectedImages.length})`; 
            vBtn.style.display = selectedImages.length > 0 ? 'inline-block' : 'none';
            cBtn.style.display = selectedImages.length > 0 ? 'inline-block' : 'none';
        }

        function openCarousel() { currentIndex=0; updateLightboxImage(); document.getElementById('lightbox').style.display='flex'; }
        function changeImage(step) { 
            if(selectedImages.length === 0) return;
            currentIndex = (currentIndex + step + selectedImages.length) % selectedImages.length; 
            updateLightboxImage(); 
        }
        function updateLightboxImage() { document.getElementById('fullImage').src = selectedImages[currentIndex]; }
        function closeLightbox() { document.getElementById('lightbox').style.display='none'; }
        
        // Teclado para el visor
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('lightbox').style.display === 'flex') {
                if (e.key === "ArrowLeft") changeImage(-1);
                if (e.key === "ArrowRight") changeImage(1);
                if (e.key === "Escape") closeLightbox();
            }
        });

        window.onload = () => { buildGalleryData(); };
    </script>
</body>
</html>
