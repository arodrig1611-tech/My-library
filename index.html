<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="preconnect" href="https://imgchest.com">
    <link rel="dns-prefetch" href="https://imgchest.com">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Library Pro - Win11 Style (Zero Lag)</title>
    <style>
        :root { 
            /* Colores Pastel Neón */
            --pastel-green: #00ffaa; 
            --pastel-pink: #ff007f; 
            --pastel-blue: #00d4ff; 
            --pastel-purple: #9d00ff;
            
            /* Colores de Tarjetas (Falso Cristal) */
            --card-bg-top: rgba(30, 30, 38, 0.85);
            --card-bg-bot: rgba(15, 15, 20, 0.95);
            --card-border: rgba(255, 255, 255, 0.05);
            --card-gloss: rgba(255, 255, 255, 0.15);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { margin: 0; padding: 0; min-height: 100%; color: white; font-family: 'Segoe UI', system-ui, sans-serif; overflow-x: hidden; }
        
        /* Fondo Win11 Fijo */
        .app-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1;
            background-color: #050508;
            background-image: 
                radial-gradient(circle at 50% 120%, rgba(255, 0, 127, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% -10%, rgba(0, 212, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at -10% 50%, rgba(157, 0, 255, 0.15) 0%, transparent 50%);
        }
        
        /* Nav Principal */
        .nav { 
            display:flex; justify-content:center; gap:12px; padding:15px; 
            position: sticky; top: 0; z-index: 1000; 
            background: rgba(10, 10, 15, 0.6); 
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--card-border); 
        }
        
        .t-btn { 
            background: rgba(255,255,255,0.03); color: #999; border: 1px solid var(--card-border); 
            padding: 10px 22px; border-radius: 30px; cursor: pointer; transition: 0.3s; 
            font-size: 13px; font-weight: 600; 
        }
        .t-btn:hover { background: rgba(255,255,255,0.08); color: white; }
        
        .t-btn.active:nth-child(1) { background: rgba(0, 255, 170, 0.1); border-color: rgba(0, 255, 170, 0.3); color: var(--pastel-green); box-shadow: 0 0 15px rgba(0, 255, 170, 0.15); }
        .t-btn.active:nth-child(2) { background: rgba(255, 0, 127, 0.1); border-color: rgba(255, 0, 127, 0.3); color: var(--pastel-pink); box-shadow: 0 0 15px rgba(255, 0, 127, 0.15); }
        .t-btn.active:nth-child(3) { background: rgba(0, 212, 255, 0.1); border-color: rgba(0, 212, 255, 0.3); color: var(--pastel-blue); box-shadow: 0 0 15px rgba(0, 212, 255, 0.15); }

        /* Barra de Filtros */
        .f-bar { 
            background: linear-gradient(180deg, var(--card-bg-top), var(--card-bg-bot));
            margin: 20px auto; padding: 15px; border-radius: 16px; 
            max-width: 1400px; border: 1px solid var(--card-border); border-top: 1px solid var(--card-gloss);
            display: flex; flex-direction: column; gap: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        input[type="text"] {
            width: 100%; padding: 14px; border-radius: 10px;
            background: rgba(0,0,0,0.4); color: white; border: 1px solid var(--card-border);
            font-size: 14px; outline: none; transition: 0.3s;
        }
        input[type="text"]:focus { border-color: var(--pastel-purple); background: rgba(0,0,0,0.6); box-shadow: 0 0 10px rgba(157, 0, 255, 0.2); }

        .cat-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .c-btn { 
            background: rgba(0,0,0,0.5); color: #aaa; border: 1px solid transparent; 
            padding: 8px 18px; border-radius: 20px; cursor: pointer; white-space: nowrap; 
            font-size: 12px; font-weight: 600; transition: 0.3s; 
        }
        .c-btn.active { background: rgba(0, 212, 255, 0.15); color: #fff; border-color: var(--pastel-blue); box-shadow: 0 0 10px rgba(0, 212, 255, 0.2); }

        /* Grid */
        .grid { 
            display:grid; gap:18px; padding:15px 20px; 
            grid-template-columns:repeat(auto-fill, minmax(170px, 1fr)); 
            max-width: 1600px; margin: 0 auto; contain: content; 
        }
        
        /* Cards */
        .card { 
            background: linear-gradient(180deg, var(--card-bg-top), var(--card-bg-bot)); 
            border: 1px solid var(--card-border); border-top: 1px solid var(--card-gloss);
            border-radius: 14px; overflow: hidden; text-align: center; cursor: pointer; 
            position: relative; transition: transform 0.2s, box-shadow 0.2s; text-decoration: none; 
            color: white; display: flex; flex-direction: column;
            content-visibility: auto; contain-intrinsic-size: 170px 280px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
        }
        .card:hover { transform: translateY(-4px); box-shadow: 0 12px 25px rgba(0,0,0,0.6); }
        
        .card img { 
            width:100%; aspect-ratio: 200 / 280; object-fit:cover; display:block; 
            background: #0d0d12;
        }

        .card span { 
            padding: 14px 10px; font-size: 12px; font-weight: 600; 
            background: transparent; color: #eaeaea; letter-spacing: 0.3px;
        }

        .anime-card { 
            padding: 20px 15px; justify-content: center; align-items: center; 
            min-height: 100px; border-radius: 14px;
        }

        .album-card { justify-content: flex-end; background-size: cover; background-position: center; aspect-ratio: 200/280; }
        .album-card span { 
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%); 
            text-shadow: 0 2px 4px #000;
        }
        
        .badge { 
            position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); 
            border: 1px solid var(--pastel-blue); color: var(--pastel-blue); 
            padding: 5px 12px; border-radius: 20px; font-size: 10px; font-weight: bold; z-index: 2; 
        }

        /* Fabs */
        .fab-container { position: fixed; bottom: 25px; right: 25px; display: none; flex-direction: column; gap: 12px; z-index: 2000; }
        .fab { 
            border: none; padding: 14px 24px; border-radius: 30px; color: white; background: #222;
            font-weight: bold; font-size: 13px; cursor: pointer; border: 1px solid var(--card-border);
            box-shadow: 0 8px 20px rgba(0,0,0,0.6); 
        }

        /* Modal */
        #modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:5000; }
        #modal img { max-width:100%; max-height:85vh; object-fit:contain; border-radius: 8px; user-select: none; }
        .m-nav { position:absolute; bottom:30px; width:100%; display:flex; justify-content:center; gap:20px; }

        .hidden { display:none !important; }
        .selected { border: 2px solid var(--pastel-pink) !important; transform: scale(0.96); opacity: 0.8; }

        /* Ajustes específicos para 4 columnas en Móvil */
        @media (max-width: 600px) {
            .grid { grid-template-columns: repeat(4, 1fr) !important; gap: 6px !important; padding: 8px !important; }
            .t-btn { padding: 8px 12px; font-size: 11px; }
            .nav { padding: 10px 5px; gap: 5px; }
            .f-bar { margin: 10px; padding: 10px; border-radius: 10px; }
            input[type="text"] { padding: 10px; font-size: 12px; }
            
            .card { border-radius: 6px; contain-intrinsic-size: 80px 120px; border-width: 1px; }
            .card span { padding: 6px 4px; font-size: 9px; line-height: 1.2; word-wrap: break-word; }
            .badge { padding: 2px 5px; font-size: 8px; top: 4px; right: 4px; border-width: 1px; }
            .anime-card { padding: 8px 4px; min-height: 70px; }
            .fab-container { bottom: 15px; right: 15px; gap: 8px; }
            .fab { padding: 10px 16px; font-size: 11px; }
            .m-nav { display: none; } /* Ocultamos botones en móvil, usamos el swipe */
        }
    </style>
</head>
<body>

    <div class="app-bg"></div>

    <div class="nav">
        <button class="t-btn active" onclick="tab('mangas',this)">📚 Mangas</button>
        <button class="t-btn" onclick="tab('galeria',this)">🖼️ Galería</button>
        <button class="t-btn" onclick="tab('animes',this)">📺 Animes</button>
    </div>

    <div id="t-mangas">
        <div class="f-bar">
            <input type="text" placeholder="Buscar manga..." oninput="loadMangas(this.value)">
        </div>
        <div id="m-grid" class="grid"></div>
    </div>

    <div id="t-galeria" class="hidden">
        <div class="f-bar">
            <input type="text" id="gSearch" placeholder="Buscar ilustraciones..." oninput="renderAlbums(this.value)">
            <div class="cat-row" id="catFilters">
                <button class="c-btn active" onclick="filterCat('TODOS', this)">Todos</button>
                <button class="c-btn" onclick="filterCat('Anime_Manga', this)">Anime/Manga</button>
                <button class="c-btn" onclick="filterCat('Juegos', this)">Juegos</button>
                <button class="c-btn" onclick="filterCat('Comic', this)">Comic</button>
                <button class="c-btn" onclick="filterCat('Real', this)">Real</button>
                <button class="c-btn" onclick="filterCat('Variados', this)">Variados</button>
            </div>
        </div>
        <div class="fab-container" id="g-fabs">
            <button class="fab" style="border-color:var(--pastel-pink); color:var(--pastel-pink);" onclick="openM()" id="viewBtn">👁️ Ver (0)</button>
            <button class="fab" style="border-color:var(--pastel-green); color:var(--pastel-green);" onclick="clearSel()">🧹 Limpiar</button>
        </div>
        <div id="g-grid" class="grid"></div>
    </div>

    <div id="t-animes" class="hidden">
        <div class="f-bar"><input type="text" placeholder="Buscar anime..." oninput="searchGeneric(this.value, 'a-grid')"></div>
        <div id="a-grid" class="grid"></div>
    </div>

    <!-- Modal con soporte Swipe -->
    <div id="modal">
        <button style="position:absolute; top:20px; right:20px; background:transparent; border:none; color:white; font-size:30px; cursor:pointer;" onclick="closeM()">✕</button>
        <img id="m-img" src="">
        <div class="m-nav">
            <button class="t-btn" style="background:#222; border-color:#444;" onclick="changeM(-1)">❮</button>
            <button class="t-btn" style="background:#222; border-color:#444;" onclick="changeM(1)">❯</button>
        </div>
    </div>

    <script src="lista_mangas.js"></script>
    <script src="lista_imagenes.js"></script>
    <script src="lista_animes.js"></script> 
    <script>
    let db = [], selectedDB = new Map(), curIdx = 0, activeCat = 'TODOS';
    let renderTask = null; // Variable clave para matar el lag

    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

    function createLazyImg(src, alt) {
        const img = document.createElement('img');
        img.loading = 'lazy'; 
        img.decoding = 'async'; // Libera la CPU en imágenes pesadas
        img.src = src;
        img.alt = alt || '';
        return img;
    }

    function tab(t, b) {
        document.getElementById('t-mangas').classList.toggle('hidden', t !== 'mangas');
        document.getElementById('t-galeria').classList.toggle('hidden', t !== 'galeria');
        document.getElementById('t-animes').classList.toggle('hidden', t !== 'animes');
        document.getElementById('g-fabs').style.display = (t === 'galeria') ? 'flex' : 'none';
        document.querySelectorAll('.nav .t-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        if (t === 'galeria' && db.length === 0) loadG();
        if (t === 'animes') loadAnimes();
    }

    /* --- MANGAS (Con Micro-Batching) --- */
    function loadMangas(filter = "") {
        clearTimeout(renderTask);
        const grid = document.getElementById('m-grid');
        grid.innerHTML = '';
        if (typeof bibliotecaMangas === 'undefined') return;

        const seriesMap = {};
        Object.keys(bibliotecaMangas).forEach(key => {
            const baseName = key.split(/_ch|_Vol/i)[0].replace(/_/g, ' ');
            const isSub = key.includes('_ch') || key.includes('_Vol');
            if (!seriesMap[baseName]) {
                seriesMap[baseName] = { nombre: baseName, caps: [], portada: bibliotecaMangas[key][0] };
            }
            seriesMap[baseName].caps.push({ key, label: isSub ? `Cap ${key.split(/_ch|_Vol/i)[1]}` : "Completo" });
        });

        const itemsToRender = Object.values(seriesMap).sort((a,b) => a.nombre.localeCompare(b.nombre)).filter(serie => {
            return !(filter && !serie.nombre.toLowerCase().includes(filter.toLowerCase()));
        });

        let i = 0;
        function renderBatch() {
            const fragment = document.createDocumentFragment();
            const chunkEnd = Math.min(i + 24, itemsToRender.length);
            for (; i < chunkEnd; i++) {
                const serie = itemsToRender[i];
                const card = document.createElement('div');
                card.className = 'card';
                const hasMultiple = serie.caps.length > 1;
                
                card.innerHTML = hasMultiple ? `<div class="badge">${serie.caps.length} Caps</div>` : '';
                card.appendChild(createLazyImg(serie.portada, serie.nombre));
                card.innerHTML += `<span>${serie.nombre}</span>`;
                
                card.onclick = () => {
                    if (hasMultiple) renderExpandedSerie(serie);
                    else window.location.href = `reader.html?manga=${serie.caps[0].key}`;
                };
                fragment.appendChild(card);
            }
            grid.appendChild(fragment);
            if (i < itemsToRender.length) renderTask = setTimeout(renderBatch, 15);
        }
        renderBatch();
    }

    function renderExpandedSerie(serie) {
        clearTimeout(renderTask);
        const grid = document.getElementById('m-grid');
        grid.innerHTML = `<div class="card anime-card" style="grid-column: 1/-1; min-height: 60px; border-color: var(--pastel-green);" onclick="loadMangas()"><span style="color:var(--pastel-green);">⬅ Volver a Biblioteca</span></div>`;
        
        const itemsToRender = [...serie.caps].sort((a,b) => a.label.localeCompare(b.label, undefined, {numeric: true}));
        
        let i = 0;
        function renderBatch() {
            const fragment = document.createDocumentFragment();
            const chunkEnd = Math.min(i + 24, itemsToRender.length);
            for (; i < chunkEnd; i++) {
                const cap = itemsToRender[i];
                const card = document.createElement('div');
                card.className = 'card';
                card.appendChild(createLazyImg(bibliotecaMangas[cap.key][0], serie.nombre));
                card.innerHTML += `<span>${serie.nombre} - ${cap.label}</span>`;
                card.onclick = () => window.location.href = `reader.html?manga=${cap.key}`;
                fragment.appendChild(card);
            }
            grid.appendChild(fragment);
            if (i < itemsToRender.length) renderTask = setTimeout(renderBatch, 15);
        }
        renderBatch();
        window.scrollTo(0,0);
    }

    /* --- GALERÍA (Con Micro-Batching) --- */
    function loadG() {
        db = [];
        if (typeof galeria_maestra === 'undefined') return;
        for (let [cat, pers] of Object.entries(galeria_maestra)) {
            for (let [nom, links] of Object.entries(pers)) {
                links.forEach(url => db.push({ r: url, p: nom, sub: cat, g: nom }));
            }
        }
        renderAlbums();
    }

    function filterCat(cat, btn) {
        activeCat = cat;
        document.querySelectorAll('.c-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderAlbums(document.getElementById('gSearch').value);
    }

    function renderAlbums(filter = "") {
        clearTimeout(renderTask);
        const grid = document.getElementById('g-grid');
        grid.innerHTML = '';
        
        const groups = [...new Set(db.map(i => i.g))].sort();
        const itemsToRender = [];
        
        groups.forEach(g => {
            const data = db.filter(i => i.g === g);
            const item = data[0];
            if (filter && !item.p.toLowerCase().includes(filter.toLowerCase().replace(/ /g, '_'))) return;
            if (activeCat !== 'TODOS' && item.sub !== activeCat) return;
            itemsToRender.push({ g, data, item });
        });

        let i = 0;
        function renderBatch() {
            const fragment = document.createDocumentFragment();
            const chunkEnd = Math.min(i + 24, itemsToRender.length);
            for (; i < chunkEnd; i++) {
                const { g, data, item } = itemsToRender[i];
                const card = document.createElement('div');
                
                if (item.sub === 'Real') {
                    card.className = 'card' + (selectedDB.has(item.r) ? ' selected' : '');
                    card.appendChild(createLazyImg(item.r, item.p));
                    card.innerHTML += `<span>${item.p.replace(/_/g, ' ')}</span>`;
                    card.onclick = () => toggleSelection(item, card);
                } else {
                    card.className = 'card album-card';
                    card.style.backgroundImage = `url('${item.r}')`;
                    card.innerHTML = `<div class="badge">${data.length} fotos</div><span>${item.p.replace(/_/g, ' ')}</span>`;
                    card.onclick = () => renderImages(g);
                }
                fragment.appendChild(card);
            }
            grid.appendChild(fragment);
            if (i < itemsToRender.length) renderTask = setTimeout(renderBatch, 15);
        }
        renderBatch();
    }

    function renderImages(g) {
        clearTimeout(renderTask);
        const grid = document.getElementById('g-grid');
        grid.innerHTML = `<div class="card anime-card" style="grid-column: 1/-1; min-height: 60px; border-color: var(--pastel-purple);" onclick="renderAlbums()"><span style="color:var(--pastel-purple);">⬅ Volver</span></div>`;
        
        const itemsToRender = db.filter(i => i.g === g);
        
        let i = 0;
        function renderBatch() {
            const fragment = document.createDocumentFragment();
            const chunkEnd = Math.min(i + 24, itemsToRender.length);
            for (; i < chunkEnd; i++) {
                const item = itemsToRender[i];
                const card = document.createElement('div');
                card.className = 'card' + (selectedDB.has(item.r) ? ' selected' : '');
                card.appendChild(createLazyImg(item.r, item.p));
                card.innerHTML += `<span>${item.p.replace(/_/g, ' ')}</span>`;
                card.onclick = () => toggleSelection(item, card);
                fragment.appendChild(card);
            }
            grid.appendChild(fragment);
            if (i < itemsToRender.length) renderTask = setTimeout(renderBatch, 15);
        }
        renderBatch();
        window.scrollTo(0,0);
    }

    /* --- GESTOS SWIPE (Deslizar en móvil) --- */
    const modalEl = document.getElementById('modal');
    let touchStartX = 0;

    modalEl.addEventListener('touchstart', e => {
        touchStartX = e.changedTouches[0].screenX;
    }, {passive: true});

    modalEl.addEventListener('touchend', e => {
        const touchEndX = e.changedTouches[0].screenX;
        if (touchEndX < touchStartX - 50) changeM(1); // Deslizar Izquierda -> Siguiente
        if (touchEndX > touchStartX + 50) changeM(-1); // Deslizar Derecha -> Anterior
    }, {passive: true});

    /* --- RESTO DE FUNCIONES --- */
    function toggleSelection(item, card) {
        if (selectedDB.has(item.r)) { selectedDB.delete(item.r); card.classList.remove('selected'); }
        else { selectedDB.set(item.r, item); card.classList.add('selected'); }
        document.getElementById('viewBtn').innerText = `👁️ Ver (${selectedDB.size})`;
    }

    function loadAnimes() {
        const container = document.getElementById('a-grid');
        if (container.children.length > 0 || typeof lista_animes === 'undefined') return;
        Object.entries(lista_animes).sort().forEach(([n, url]) => {
            const a = document.createElement('a');
            a.className = 'card anime-card'; a.href = url; a.target = '_blank';
            a.innerHTML = `<span>${n.replace(/_/g, ' ')}</span>`;
            container.appendChild(a);
        });
    }

    function openM() { 
        if(selectedDB.size === 0) return;
        curIdx = 0; document.getElementById('modal').style.display = 'flex'; updM(); 
    }
    function closeM() { document.getElementById('modal').style.display = 'none'; }
    function updM() { document.getElementById('m-img').src = Array.from(selectedDB.values())[curIdx].r; }
    function changeM(d) { const s = selectedDB.size; curIdx = (curIdx + d + s) % s; updM(); }
    function clearSel() { selectedDB.clear(); renderAlbums(); document.getElementById('viewBtn').innerText = `👁️ Ver (0)`; }

    function searchGeneric(q, id) {
        const container = document.getElementById(id);
        Array.from(container.querySelectorAll('.card')).forEach(c => c.classList.toggle('hidden', !c.innerText.toLowerCase().includes(q.toLowerCase())));
    }

    window.onload = () => loadMangas();
    </script>
</body>
</html>
