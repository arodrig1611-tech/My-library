<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Library Pro - Ultra Fast</title>
    <style>
        :root { --bg: #0a0a0a; --acc: #4caf50; --pink: #d81b60; --blue: #2196f3; }
        * { box-sizing: border-box; }
        body { margin:0; font-family: sans-serif; background:var(--bg); color:white; overflow-x:hidden; }
        .nav { display:flex; justify-content:center; gap:10px; padding:20px; position: sticky; top: 0; background: var(--bg); z-index: 100; border-bottom: 1px solid #222; }
        .t-btn { background:#222; color:white; border:1px solid #444; padding:10px 20px; border-radius:20px; cursor:pointer; transition:0.2s; }
        .t-btn.active { background:var(--acc); border-color:var(--acc); }
        .f-bar { background:#141414; margin:10px auto; padding:15px; border-radius:12px; max-width:1400px; border:1px solid #333; }
        .grid { display:grid; gap:10px; padding:15px; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); }
        
        /* Floating Action Buttons */
        .fab-container { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 2000; }
        .fab { border: none; padding: 15px 25px; border-radius: 30px; color: white; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: 0.2s; }
        .fab:active { transform: scale(0.9); }

        .card { background:#161616; border:1px solid #333; border-radius:8px; overflow:hidden; text-align:center; cursor: pointer; position: relative; transition: 0.2s; text-decoration: none; color: white;}
        .card:hover { border-color: var(--acc); transform: translateY(-3px); }
        .card.selected { border: 2px solid var(--acc); background: rgba(76, 175, 80, 0.1); }
        .card img { width:100%; height:250px; object-fit:cover; display:block; background: #222; }
        .card span { display:block; padding:8px; font-size:11px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .album-card { height: 300px; display: flex; flex-direction: column; justify-content: flex-end; background-size: cover; background-position: center; }
        .album-title { background: rgba(0,0,0,0.8); padding: 12px; border-top: 1px solid var(--acc); font-size: 14px; }

        .card.anime-card { padding: 20px 10px; border-left: 4px solid var(--blue); }
        .futa-sep { grid-column:1/-1; color:var(--acc); text-align:center; padding:15px; font-weight:bold; }
        .hidden { display:none !important; }
        
        #modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:5000; }
        #modal img { max-width:95%; max-height:85vh; object-fit:contain; }
        .m-nav { position:absolute; bottom:20px; width:100%; display:flex; justify-content:center; gap:20px; }
        .m-btn { background:var(--acc); color:white; border:none; padding:10px 25px; border-radius:20px; cursor:pointer; }
    </style>
</head>
<body>

    <div class="nav">
        <button class="t-btn active" onclick="tab('mangas',this)">📚 Mis Mangas</button>
        <button class="t-btn" onclick="tab('galeria',this)">🖼️ Ilustraciones</button>
        <button class="t-btn" onclick="tab('animes',this)">📺 Animes</button>
    </div>

    <div id="t-mangas">
        <div class="f-bar"><input type="text" placeholder="Buscar manga..." style="width:100%; padding:10px; background:#111; color:white; border:1px solid #333; border-radius:8px;" oninput="searchGeneric(this.value, 'm-grid')"></div>
        <div id="m-grid" class="grid">
            <a class="card" href="reader.html?manga=Francis_X_Raikou"><span>Francis X Raikou</span></a>
            <a class="card" href="reader.html?manga=Yang_Gui_Fei_X_Prota"><span>Yang Gui Fei X Prota</span></a>
            <a class="card" href="reader.html?manga=Ibuki_X_Yui"><span>Ibuki X Yui</span></a>
            <a class="card" href="reader.html?manga=BB_X_Prota"><span>BB X Prota</span></a>
            <a class="card" href="reader.html?manga=Jalter_X_Apocrypha_NPC"><span>Jalter X Apocrypha NPC</span></a>
            <div class="futa-sep">FUTANARIJIMA</div>
            <a class="card" href="reader.html?manga=Futanarijima_ch1"><span>Capítulo 1</span></a>
            <a class="card" href="reader.html?manga=Futanarijima_ch2"><span>Capítulo 2</span></a>
            <a class="card" href="reader.html?manga=Futanarijima_ch3"><span>Capítulo 3</span></a>
            <a class="card" href="reader.html?manga=Futanarijima_ch4"><span>Capítulo 4</span></a>
            <a class="card" href="reader.html?manga=Futanarijima_ch5"><span>Capítulo 5</span></a>
            <a class="card" href="reader.html?manga=Futanarijima_ch6"><span>Capítulo 6</span></a>
        </div>
    </div>

    <div id="t-galeria" class="hidden">
        <div class="f-bar">
            <input type="text" id="gSearch" placeholder="Buscar personaje..." style="width:100%; padding:10px; background:#111; color:white; border:1px solid #333; border-radius:8px;" oninput="renderAlbums(this.value)">
        </div>
        
        <div class="fab-container">
            <button class="fab" style="background:var(--pink);" onclick="openM()" id="viewBtn">👁️ Ver (0)</button>
            <button class="fab" style="background:#f44336;" onclick="clearSel()">🧹 Limpiar</button>
        </div>

        <div id="g-grid" class="grid"></div>
    </div>

    <div id="t-animes" class="hidden">
        <div class="f-bar"><input type="text" placeholder="Buscar anime..." style="width:100%; padding:10px; background:#111; color:white; border:1px solid #333; border-radius:8px;" oninput="searchGeneric(this.value, 'a-grid')"></div>
        <div id="a-grid" class="grid"></div>
    </div>

    <div id="modal" onclick="if(event.target===this) closeM()">
        <button style="position:absolute; top:20px; right:20px; background:none; border:none; color:white; font-size:30px;" onclick="closeM()">✕</button>
        <img id="m-img" src="">
        <div class="m-nav">
            <button class="m-btn" onclick="changeM(-1)">❮ Anterior</button>
            <button class="m-btn" onclick="changeM(1)">Siguiente ❯</button>
        </div>
    </div>

    <script src="lista_imagenes.js"></script>
    <script src="lista_animes.js"></script> 
    <script>
    let db = [], selectedDB = new Map(), curIdx = 0, currentView = 'albums';

    // Manejo del botón "Atrás" del navegador/celular
    window.onpopstate = function() {
        if (document.getElementById('modal').style.display === 'flex') closeM(false);
        else if (currentView === 'images') renderAlbums();
    };

    function tab(t, b) {
        document.getElementById('t-mangas').classList.toggle('hidden', t !== 'mangas');
        document.getElementById('t-galeria').classList.toggle('hidden', t !== 'galeria');
        document.getElementById('t-animes').classList.toggle('hidden', t !== 'animes');
        document.querySelectorAll('.t-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        if (t === 'galeria' && db.length === 0) loadG();
        if (t === 'animes') loadAnimes();
    }

    function searchGeneric(q, id) {
        document.querySelectorAll(`#${id} .card`).forEach(c => c.classList.toggle('hidden', !c.innerText.toLowerCase().includes(q.toLowerCase())));
    }

    function loadG() {
        const proc = (obj, cat) => {
            if(!obj) return;
            for (let [p, links] of Object.entries(obj)) links.forEach(r => db.push({ r, p, g: (cat==="Realista"?"Real":p) }));
        };
        proc(lista_ilustraciones, "Ilus"); proc(lista_real, "Realista"); proc(lista_rule34, "Rule34");
        renderAlbums();
    }

    function renderAlbums(filter = "") {
        currentView = 'albums';
        const grid = document.getElementById('g-grid');
        grid.innerHTML = '';
        const groups = [...new Set(db.map(i => i.g))].filter(g => g.toLowerCase().includes(filter.toLowerCase())).sort();
        groups.forEach(g => {
            const item = db.find(i => i.g === g);
            const album = document.createElement('div');
            album.className = 'card album-card';
            album.style.backgroundImage = `url('${item.r}')`;
            album.innerHTML = `<div class="album-title">${g.replace(/_/g, ' ')}</div>`;
            album.onclick = () => { history.pushState({}, ""); renderImages(g); };
            grid.appendChild(album);
        });
    }

    function renderImages(groupName) {
        currentView = 'images';
        const grid = document.getElementById('g-grid');
        grid.innerHTML = `<div class="card album-card" style="height:50px; background:var(--pink); justify-content:center" onclick="history.back()"><span>⬅ Volver a Personajes</span></div>`;
        db.filter(i => i.g === groupName).forEach(item => {
            const card = document.createElement('div');
            card.className = 'card' + (selectedDB.has(item.r) ? ' selected' : '');
            card.innerHTML = `<img src="${item.r}" loading="lazy"><span>${item.p}</span>`;
            card.onclick = () => {
                if (selectedDB.has(item.r)) { selectedDB.delete(item.r); card.classList.remove('selected'); }
                else { selectedDB.set(item.r, item); card.classList.add('selected'); }
                document.getElementById('viewBtn').innerText = `👁️ Ver (${selectedDB.size})`;
            };
            grid.appendChild(card);
        });
    }

    function openM() { 
        if(selectedDB.size > 0) { 
            curIdx = 0; 
            history.pushState({}, "");
            document.getElementById('modal').style.display = 'flex'; 
            updM(); 
        } 
    }
    
    function closeM(pushHistory = true) { 
        document.getElementById('modal').style.display = 'none'; 
        if(pushHistory) history.back();
    }

    function updM() { document.getElementById('m-img').src = Array.from(selectedDB.values())[curIdx].r; }
    function changeM(d) { const s = selectedDB.size; curIdx = (curIdx + d + s) % s; updM(); }

    // Control por teclado (PC)
    document.onkeydown = (e) => {
        if (document.getElementById('modal').style.display === 'flex') {
            if (e.key === "ArrowRight") changeM(1);
            if (e.key === "ArrowLeft") changeM(-1);
            if (e.key === "Escape") closeM();
        }
    };

    function clearSel() {
        selectedDB.clear();
        document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
        document.getElementById('viewBtn').innerText = `👁️ Ver (0)`;
    }

    function loadAnimes() {
        const container = document.getElementById('a-grid');
        if (container.children.length > 0) return;
        for (const [n, url] of Object.entries(lista_animes)) {
            const a = document.createElement('a');
            a.className = 'card anime-card'; a.href = url; a.target = '_blank';
            a.innerHTML = `<span>${n.replace(/_/g, ' ')}</span>`;
            container.appendChild(a);
        }
    }
    </script>
</body>
</html>
