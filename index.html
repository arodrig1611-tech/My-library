<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Library Pro - Fixed</title>
    <style>
        :root { --bg: #0a0a0a; --acc: #4caf50; --pink: #d81b60; }
        * { box-sizing: border-box; }
        body { margin:0; font-family: sans-serif; background:var(--bg); color:white; overflow-x:hidden; }

        /* Nav */
        .nav { display:flex; justify-content:center; gap:10px; padding:20px; position: sticky; top: 0; background: var(--bg); z-index: 100; border-bottom: 1px solid #222; }
        .t-btn { background:#222; color:white; border:1px solid #444; padding:10px 20px; border-radius:20px; cursor:pointer; transition:0.2s; }
        .t-btn.active { background:var(--acc); border-color:var(--acc); }

        /* Contenedores */
        .f-bar { background:#141414; margin:10px auto; padding:15px; border-radius:12px; max-width:1400px; border:1px solid #333; }
        .f-group { display:flex; flex-wrap: wrap; gap:8px; margin-top:10px; } /* Corregido para que no se corte */
        
        .grid { display:grid; gap:15px; padding:20px; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); }
        @media (max-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } }

        .card { background:#161616; border:1px solid #333; border-radius:10px; text-decoration:none; color:white; overflow:hidden; text-align:center; cursor: pointer; position: relative; }
        .card.selected { border: 3px solid var(--acc); }
        .card img { width:100%; height:250px; object-fit:cover; display:block; background: #222; }
        .card span { display:block; padding:10px; font-size:12px; font-weight: bold; }

        .futa-sep { grid-column:1/-1; color:var(--acc); text-align:center; border-top:1px dashed #333; padding:15px; font-weight:bold; }
        .hidden { display:none !important; }
        
        /* Modal */
        #modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:5000; }
        #modal img { max-width:95%; max-height:85vh; object-fit:contain; }
        .m-nav { position:absolute; bottom:20px; width:100%; display:flex; justify-content:center; gap:20px; }
        .m-btn { background:var(--acc); color:white; border:none; padding:10px 25px; border-radius:20px; cursor:pointer; }
    </style>
</head>
<body>

    <div class="nav">
        <button class="t-btn active" id="btn-mangas" onclick="tab('mangas',this)">📚 Mis Mangas</button>
        <button class="t-btn" id="btn-galeria" onclick="tab('galeria',this)">🖼️ Ilustraciones</button>
    </div>

    <div id="t-mangas">
        <div class="f-bar">
            <input type="text" placeholder="Buscar manga..." style="width:100%; padding:10px; background:#111; color:white; border:1px solid #333; border-radius:8px;" oninput="searchM(this.value)">
        </div>
        <div id="m-grid" class="grid">
            <a class="card" href="reader.html?manga=Francis_X_Raikou"><span>Francis X Raikou</span></a>
            <a class="card" href="reader.html?manga=Yang_Gui_Fei_X_Prota"><span>Yang Gui Fei X Prota</span></a>
            <a class="card" href="reader.html?manga=Ibuki_X_Yui"><span>Ibuki X Yui</span></a>
            <a class="card" href="reader.html?manga=BB_X_Prota"><span>BB X Prota</span></a>
            <a class="card" href="reader.html?manga=Jalter_X_Apocrypha_NPC"><span>Jalter X Apocrypha NPC</span></a>
            
            <div class="futa-sep">FUTANARIJIMA</div>
            <a class="card" href="reader.html?manga=Futanarijima_ch1"><span>Capítulo 1</span></a>
            <a class="card" href="reader.html?manga=Futanarijima_ch2"><span>Capítulo 2</span></a>
            <a class="card" href="reader.html?manga=Futanarijima_ch3"><span>Capítulo 3</span></a>
            <a class="card" href="reader.html?manga=Futanarijima_ch4"><span>Capítulo 4</span></a>
            <a class="card" href="reader.html?manga=Futanarijima_ch5"><span>Capítulo 5</span></a>
            <a class="card" href="reader.html?manga=Futanarijima_ch6"><span>Capítulo 6</span></a>
        </div>
    </div>

    <div id="t-galeria" class="hidden">
        <div class="f-bar">
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <input type="text" id="gSearch" placeholder="Buscar personaje..." style="flex-grow:1; padding:10px; background:#111; color:white; border:1px solid #333; border-radius:8px;" oninput="filtG()">
                <button class="t-btn" style="background:var(--pink)" onclick="openM()" id="viewBtn">👁️ (0)</button>
            </div>
            <div id="cats" class="f-group"></div>
            <div id="pjs" class="f-group"></div>
        </div>
        <div id="g-grid" class="grid"></div>
    </div>

    <div id="modal" onclick="if(event.target===this) closeM()">
        <button style="position:absolute; top:20px; right:20px; background:none; border:none; color:white; font-size:30px;" onclick="closeM()">✕</button>
        <img id="m-img" src="">
        <div class="m-nav">
            <button class="m-btn" onclick="changeM(-1)">❮ Anterior</button>
            <button class="m-btn" onclick="changeM(1)">Siguiente ❯</button>
        </div>
    </div>

    <script src="lista_imagenes.js"></script>
    <script>
    let db = [], selectedDB = new Map(), fCat = 'Todos', fPj = 'Todos', curIdx = 0;

    function tab(t, b) {
        document.getElementById('t-mangas').classList.toggle('hidden', t !== 'mangas');
        document.getElementById('t-galeria').classList.toggle('hidden', t !== 'galeria');
        document.querySelectorAll('.nav .t-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        if (t === 'galeria' && db.length === 0) loadG();
    }

    function loadG() {
        const tempDb = [];
        const proc = (o, c) => { 
            if (!o) return; 
            let realCounter = 1; 
            for (let [p, l] of Object.entries(o)) {
                // Lógica corregida: El grupo para el filtro es el nombre de la carpeta (p), 
                // EXCEPTO para "Realista" que se agrupa todo en "Real"
                const filterGroupName = (c === "Realista") ? "Real" : p;
                
                l.forEach(r => {
                    tempDb.push({
                        r, 
                        p: (c === "Realista") ? `Real ${realCounter++}` : p, 
                        c, 
                        g: filterGroupName 
                    });
                });
            }
        };
        proc(lista_ilustraciones, "Ilustraciones"); 
        proc(lista_real, "Realista"); 
        proc(lista_rule34, "Rule34");
        db = tempDb;
        renderF(); 
        filtG();
    }

    function renderF() {
        const gen = (id, l, cur, type) => {
            const d = document.getElementById(id);
            const frag = document.createDocumentFragment();
            // Filtramos Futa de los botones si así lo prefieres, pero mantenemos el resto
            const items = type === 'p' ? l.filter(x => x !== 'Todos' && x !== 'Futa') : l;

            items.forEach(x => {
                const b = document.createElement('button'); 
                b.innerText = x;
                b.className = 't-btn' + (x === cur ? ' active' : ''); 
                b.style.fontSize = '11px';
                b.onclick = () => { 
                    if (type === 'c') fCat = x;
                    else fPj = (fPj === x) ? 'Todos' : x;
                    renderF(); filtG(); 
                };
                frag.appendChild(b);
            });
            d.innerHTML = ''; d.appendChild(frag);
        };

        gen('cats', ['Todos', ...new Set(db.map(i => i.c))], fCat, 'c');
        const pjsUnicos = [...new Set(db.map(i => i.g))].sort();
        gen('pjs', ['Todos', ...pjsUnicos], fPj, 'p');
    }

    function filtG() {
        const q = document.getElementById('gSearch').value.toLowerCase();
        const g = document.getElementById('g-grid');
        const frag = document.createDocumentFragment();
        
        const filtered = db.filter(i => 
            (fCat === 'Todos' || i.c === fCat) && 
            (fPj === 'Todos' || i.g === fPj) && 
            (i.p.toLowerCase().includes(q))
        );

        filtered.forEach(i => {
            const c = document.createElement('div');
            c.className = 'card' + (selectedDB.has(i.r) ? ' selected' : '');
            c.innerHTML = `<img src="${i.r}" loading="lazy"><span>${i.p}</span>`;
            c.onclick = () => {
                if (selectedDB.has(i.r)) selectedDB.delete(i.r);
                else selectedDB.set(i.r, i);
                c.classList.toggle('selected');
                document.getElementById('viewBtn').innerText = `👁️ (${selectedDB.size})`;
            };
            frag.appendChild(c);
        });
        g.innerHTML = ''; g.appendChild(frag);
    }

    // Funciones del modal y búsqueda de mangas se mantienen...
    function openM() { 
        if(selectedDB.size === 0) return;
        curIdx = 0; document.getElementById('modal').style.display = 'flex'; updM(); 
    }
    function closeM() { document.getElementById('modal').style.display = 'none'; }
    function updM() {
        const items = Array.from(selectedDB.values());
        document.getElementById('m-img').src = items[curIdx].r;
    }
    function changeM(d) {
        const s = selectedDB.size;
        curIdx = (curIdx + d + s) % s; updM();
    }
    function searchM(q) {
        document.querySelectorAll('#m-grid .card').forEach(c => {
            if(c.classList.contains('futa-sep')) return;
            c.classList.toggle('hidden', !c.innerText.toLowerCase().includes(q.toLowerCase()));
        });
    }
    </script>
</body>
</html>
