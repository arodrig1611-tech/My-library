<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><title>Manga Library & Gallery</title>
    <style>
        :root { --bg-dark: #0f0f0f; --accent: #4caf50; --error: #f44336; --glass: rgba(25,25,25,0.9); }
        body { margin:0; font-family:'Segoe UI',Roboto,sans-serif; background:var(--bg-dark); color:white; min-height:100vh; overflow-x:hidden; }
        h1 { text-align:center; margin:30px 0; font-weight:300; letter-spacing:2px; }
        .tab-nav { display:flex; justify-content:center; gap:12px; margin-bottom:25px; }
        .tab-btn { background:#222; color:white; border:1px solid #444; padding:12px 24px; border-radius:30px; cursor:pointer; font-size:16px; font-weight:bold; transition: 0.3s; }
        .tab-btn.active { background:var(--accent); border-color:var(--accent); box-shadow:0 0 15px rgba(76,175,80,0.3); }
        
        .manga-list { max-width:1100px; margin:0 auto; display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:20px; padding:20px; }
        .manga-card { text-decoration:none; color:white; background:#1a1a1a; padding:30px 20px; border-radius:15px; text-align:center; border:1px solid #333; transition:0.3s; display:flex; align-items:center; justify-content:center; min-height:80px; }
        .manga-card:hover { transform:translateY(-5px); border-color:var(--accent); }

        .gallery-container { max-width:1500px; margin:0 auto; padding:0 20px; }
        .filter-bar { background:var(--glass); backdrop-filter:blur(15px); padding:20px; border-radius:15px; margin-bottom:20px; border:1px solid #444; position:sticky; top:10px; z-index:100; }
        #searchBox { width:100%; padding:12px; margin-bottom:20px; border-radius:10px; border:1px solid #444; background:#111; color:white; font-size:16px; outline:none; }

        .filter-group { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:15px; max-height:200px; overflow-y:auto; padding:5px; }
        .filter-label { width:100%; font-size:14px; color:var(--accent); text-transform:uppercase; margin-bottom:8px; font-weight:bold; }
        .btn-filter { background:#333; color:#eee; border:1px solid #444; padding:8px 16px; border-radius:8px; cursor:pointer; font-size:15px; transition:0.2s; text-transform: capitalize; }
        .btn-filter.active { background:var(--accent); color:white; }
        
        .gallery-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:20px; padding-bottom:120px; }
        .img-card { background:#161616; border-radius:12px; overflow:hidden; border:1px solid #333; cursor:pointer; content-visibility: auto; contain-intrinsic-size: 350px; }
        .img-card img { width:100%; height:350px; object-fit:cover; display:block; }
        .img-card .info { padding:12px; font-size:13px; text-align:center; color:#999; background:#1a1a1a; border-top:1px solid #222; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .img-card.selected { border:3px solid var(--accent); box-shadow:0 0 25px rgba(76,175,80,0.6); }
        
        /* LIGHTBOX CON BOTONES */
        #lightbox { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.97); display:none; justify-content:center; align-items:center; z-index:3000; }
        #lightbox img { max-width:94%; max-height:94%; object-fit:contain; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .nav-btn { position:absolute; top:50%; transform:translateY(-50%); background:rgba(255,255,255,0.1); color:white; border:none; font-size:40px; padding:20px 25px; cursor:pointer; border-radius:50%; transition:0.3s; z-index:3100; }
        .nav-btn:hover { background:var(--accent); }
        #prevBtn { left:30px; } #nextBtn { right:30px; }
        #closeBtn { position:absolute; top:20px; right:30px; font-size:50px; color:white; cursor:pointer; background:none; border:none; z-index:3100; }

        #menuUI { position:fixed; bottom:20px; right:20px; background:var(--glass); backdrop-filter:blur(10px); padding:15px; border-radius:15px; z-index:2000; display:flex; gap:12px; border:1px solid #444; }
        .ui-btn { background:#333; color:white; border:none; padding:12px 22px; border-radius:10px; cursor:pointer; font-weight:bold; font-size:14px; }
        #viewSelectedBtn { display:none; background:var(--accent); }
        #clearSelectedBtn { display:none; background:var(--error); }
        #stats { font-size:15px; color:#888; text-align:right; margin-bottom:10px; font-weight:bold; }
    </style>
</head>
<body>
    <h1>📚 My Library</h1>
    <div class="tab-nav">
        <button class="tab-btn active" onclick="showTab('mangas', this)">Mis Mangas</button>
        <button class="tab-btn" onclick="showTab('galeria', this)">Ilustraciones</button>
    </div>
    <div id="tab-mangas" class="tab-content">
        <div class="manga-list"> 
            <a class="manga-card" href="reader.html?path=mangas/Jalter X Apocrypha NPC/">Jalter X Apocrypha NPC</a>
            <a class="manga-card" href="reader.html?path=mangas/Ibuki X Yui/">Ibuki X Yui</a>
            <a class="manga-card" href="reader.html?path=mangas/Yang Gui Fei X Prota/">Yang Gui Fei X Prota</a>
            <a class="manga-card" href="reader.html?path=mangas/Francis X Raikou/">Francis X Raikou</a>
            <a class="manga-card" href="reader.html?path=mangas/BB X Prota/">BB X Prota</a>
            <a class="manga-card" href="mangas/Futanarijima/index.html">Futanarijima</a>
        </div>
    </div>
    <div id="tab-galeria" class="tab-content" style="display:none;">
        <div class="gallery-container">
            <div id="stats">Mostrando: 0 / Total: 0</div>
            <div class="filter-bar">
                <input type="text" id="searchBox" placeholder="Buscar por nombre, personaje o carpeta..." oninput="applyFilters()">
                <div class="filter-label">Carpeta</div><div id="cat-filters" class="filter-group"></div>
                <div class="filter-label">Personaje</div><div id="pj-filters" class="filter-group"></div>
            </div>
            <div id="galleryGrid" class="gallery-grid"></div>
        </div>
    </div>
    <div id="lightbox">
        <button id="closeBtn" onclick="closeLightbox()">&times;</button>
        <button id="prevBtn" class="nav-btn" onclick="changeImage(-1)">❮</button>
        <img id="fullImage" src="">
        <button id="nextBtn" class="nav-btn" onclick="changeImage(1)">❯</button>
    </div>
    <div id="menuUI">
        <button id="clearSelectedBtn" class="ui-btn" onclick="clearAllSelection()">Limpiar</button>
        <button id="viewSelectedBtn" class="ui-btn" onclick="openCarousel()">Ver (0)</button>
    </div>
    <script src="lista_imagenes.js"></script>
    <script>
        let filterCat='Todos', filterPj='Todos', selectedImages=[], currentIndex=0;
        function showTab(t, b) {
            document.querySelectorAll('.tab-content').forEach(x=>x.style.display='none');
            document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
            document.getElementById('tab-'+t).style.display='block'; b.classList.add('active');
            if(t==='galeria') initGallery();
        }
        function initGallery() {
            const g=document.getElementById('galleryGrid'); if(!g || typeof galleryData==='undefined') return;
            g.innerHTML=''; galleryData.forEach(img=>{
                const c=document.createElement('div'); c.className='img-card'+(selectedImages.includes(img.ruta)?' selected':'');
                c.setAttribute('data-cat', img.categoria); c.setAttribute('data-pj', img.pj);
                c.setAttribute('data-name', img.archivo.toLowerCase());
                c.innerHTML=`<img src="${img.ruta}" loading="lazy"><div class="info">${img.archivo}</div>`;
                c.onclick=()=>toggleSelect(img.ruta, c); g.appendChild(c);
            });
            updateFiltersUI(); applyFilters();
        }
        function updateFiltersUI() {
            renderBtn('cat-filters', [...new Set(galleryData.map(i=>i.categoria))], filterCat, v=>{filterCat=v; applyFilters(); updateFiltersUI();});
            renderBtn('pj-filters', [...new Set(galleryData.map(i=>i.pj))].sort(), filterPj, v=>{filterPj=v; applyFilters(); updateFiltersUI();});
        }
        function renderBtn(id, l, curr, cb) {
            const con=document.getElementById(id); if(!con) return; con.innerHTML='';
            ['Todos', ...l].forEach(i=>{ const b=document.createElement('button'); b.innerText=i; b.className='btn-filter'+(i===curr?' active':'');
            b.onclick=()=>cb(i); con.appendChild(b); });
        }
        function applyFilters() {
            const term = document.getElementById('searchBox').value.toLowerCase();
            let vis = 0; document.querySelectorAll('.img-card').forEach(c=>{
                const mC=filterCat==='Todos'||c.getAttribute('data-cat')===filterCat, 
                      mP=filterPj==='Todos'||c.getAttribute('data-pj')===filterPj,
                      mT=term==='' || c.getAttribute('data-name').includes(term) || c.getAttribute('data-cat').toLowerCase().includes(term) || c.getAttribute('data-pj').toLowerCase().includes(term);
                const isVis = mC && mP && mT;
                c.style.display=isVis?'block':'none'; if(isVis) vis++;
            });
            document.getElementById('stats').innerText = `Mostrando: ${vis} / Total: ${galleryData.length}`;
        }
        function toggleSelect(r, e) {
            const i=selectedImages.indexOf(r);
            if(i>-1) { selectedImages.splice(i,1); e.classList.remove('selected'); }
            else { if(selectedImages.length<4){ selectedImages.push(r); e.classList.add('selected'); } else alert("Máximo 4"); }
            updateUIButtons();
        }
        function clearAllSelection() {
            selectedImages=[]; document.querySelectorAll('.img-card').forEach(c=>c.classList.remove('selected')); updateUIButtons();
        }
        function updateUIButtons() {
            const vBtn=document.getElementById('viewSelectedBtn'), cBtn=document.getElementById('clearSelectedBtn');
            const hasSel = selectedImages.length > 0;
            vBtn.innerText=`Ver (${selectedImages.length})`; vBtn.style.display=hasSel?'inline-block':'none';
            cBtn.style.display=hasSel?'inline-block':'none';
        }
        function openCarousel() { currentIndex=0; updateLightboxImage(); document.getElementById('lightbox').style.display='flex'; }
        function changeImage(s) { 
            if(selectedImages.length === 0) return;
            currentIndex = (currentIndex + s + selectedImages.length) % selectedImages.length; 
            updateLightboxImage(); 
        }
        function updateLightboxImage() { document.getElementById('fullImage').src = selectedImages[currentIndex]; }
        function closeLightbox() { document.getElementById('lightbox').style.display='none'; }
        
        window.onload=()=>{ if(typeof galleryData!=='undefined') initGallery(); };
        window.onkeydown=(e)=>{ 
            if(e.key==="Escape") closeLightbox(); 
            if(e.key==="ArrowRight" && selectedImages.length) changeImage(1); 
            if(e.key==="ArrowLeft" && selectedImages.length) changeImage(-1); 
        };
    </script>
</body>
</html>
