<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="preconnect" href="https://imgchest.com">
    <link rel="dns-prefetch" href="https://imgchest.com">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Library Pro - Glass UI</title>
    <style>
        :root { 
            /* Fondo base profundo para el contraste del cristal */
            --bg-gradient: radial-gradient(circle at 50% 0%, #1e1b2e 0%, #0a0a0f 100%);
            
            /* Colores Pastelosos */
            --pastel-green: #a8e6cf; 
            --pastel-pink: #ffb7b2; 
            --pastel-blue: #99c1f1; 
            
            /* Variables Glassmorphism */
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-panel: rgba(15, 15, 20, 0.6);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin:0; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg-gradient); background-attachment: fixed; color:white; overflow-x:hidden; min-height: 100vh; }
        
        /* Nav Principal Glass */
        .nav { 
            display:flex; justify-content:center; gap:15px; padding:20px; 
            position: sticky; top: 0; z-index: 1000; 
            background: rgba(10, 10, 15, 0.7); 
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border); 
        }
        
        .t-btn { 
            background: var(--glass-bg); color: #aaa; border: 1px solid var(--glass-border); 
            padding: 10px 24px; border-radius: 30px; cursor: pointer; transition: all 0.3s ease; 
            font-size: 14px; font-weight: 600; letter-spacing: 0.5px;
        }
        .t-btn:hover { background: rgba(255,255,255,0.1); color: white; }
        
        /* Estados Activos Nav (Pastel) */
        .t-btn.active:nth-child(1) { background: rgba(168, 230, 207, 0.15); border-color: var(--pastel-green); color: var(--pastel-green); box-shadow: 0 0 15px rgba(168, 230, 207, 0.2); }
        .t-btn.active:nth-child(2) { background: rgba(255, 183, 178, 0.15); border-color: var(--pastel-pink); color: var(--pastel-pink); box-shadow: 0 0 15px rgba(255, 183, 178, 0.2); }
        .t-btn.active:nth-child(3) { background: rgba(153, 193, 241, 0.15); border-color: var(--pastel-blue); color: var(--pastel-blue); box-shadow: 0 0 15px rgba(153, 193, 241, 0.2); }

        /* Barra de Filtros Glass */
        .f-bar { 
            background: var(--glass-panel); backdrop-filter: blur(10px);
            margin: 20px auto; padding: 15px; border-radius: 16px; 
            max-width: 1400px; border: 1px solid var(--glass-border); 
            display: flex; flex-direction: column; gap: 12px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        
        input[type="text"] {
            width: 100%; padding: 14px; border-radius: 10px;
            background: rgba(0,0,0,0.3); color: white; border: 1px solid var(--glass-border);
            font-size: 14px; outline: none; transition: 0.3s;
        }
        input[type="text"]:focus { border-color: var(--pastel-blue); background: rgba(0,0,0,0.5); }
        input[type="text"]::placeholder { color: #777; }

        .cat-row { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .c-btn { 
            background: rgba(0,0,0,0.4); color: #aaa; border: 1px solid var(--glass-border); 
            padding: 8px 20px; border-radius: 20px; cursor: pointer; white-space: nowrap; 
            font-size: 12px; font-weight: 600; transition: 0.3s; 
        }
        .c-btn.active { background: var(--pastel-blue); color: #111; border-color: var(--pastel-blue); box-shadow: 0 0 10px rgba(153,193,241,0.4); }

        /* Grid */
        .grid { 
            display:grid; gap:20px; padding:20px; 
            grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); 
            max-width: 1600px; margin: 0 auto; contain: content; 
        }
        
        /* Cards Glassmorphism */
        .card { 
            background: var(--glass-bg); border: 1px solid var(--glass-border); 
            border-radius: 16px; overflow: hidden; text-align: center; cursor: pointer; 
            position: relative; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
            text-decoration: none; color: white; display: flex; flex-direction: column;
            content-visibility: auto; contain-intrinsic-size: 200px 300px;
            transform: translateZ(0); box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .card:hover { 
            transform: translateY(-5px) translateZ(0); 
            border-color: rgba(255,255,255,0.2); 
            box-shadow: 0 12px 25px rgba(0,0,0,0.4); 
        }
        
        .card img { 
            width:100%; aspect-ratio: 200 / 280; object-fit:cover; display:block; 
            background: rgba(20,20,20,0.5); transition: opacity 0.3s; 
        }
        
        /* Títulos flotantes en cristal */
        .card span { 
            position: absolute; bottom: 0; left: 0; width: 100%;
            padding: 15px 10px; font-size: 12px; font-weight: 600; 
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 100%);
            backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
            border-top: 1px solid rgba(255,255,255,0.05); text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        /* Tarjetas exclusivas para Animes (Sin imagen) */
        .anime-card { 
            padding: 25px 15px; justify-content: center; align-items: center; 
            background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(0,0,0,0.2));
            height: 100%; min-height: 100px; border-radius: 16px;
        }
        .anime-card span { position: relative; background: transparent; backdrop-filter: none; border: none; padding: 0; }

        /* Álbumes */
        .album-card { justify-content: flex-end; background-size: cover; background-position: center; aspect-ratio: 200/280; }
        .badge { 
            position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.6); 
            backdrop-filter: blur(5px); border: 1px solid var(--pastel-blue); color: var(--pastel-blue); 
            padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: bold; z-index: 2; 
        }
        .manga-badge { border-color: var(--pastel-pink); color: var(--pastel-pink); }

        /* Fabs */
        .fab-container { position: fixed; bottom: 30px; right: 30px; display: none; flex-direction: column; gap: 15px; z-index: 2000; }
        .fab { 
            border: none; padding: 15px 25px; border-radius: 30px; color: #111; 
            font-weight: bold; font-size: 14px; cursor: pointer; transition: 0.3s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4); 
        }
        .fab:hover { transform: scale(1.05); }

        /* Modal Glass */
        #modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); backdrop-filter: blur(8px); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:5000; }
        #modal img { max-width:98%; max-height:85vh; object-fit:contain; border-radius: 8px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .m-nav { position:absolute; bottom:30px; width:100%; display:flex; justify-content:center; gap:20px; }

        .hidden { display:none !important; }
        .selected { border: 2px solid var(--pastel-pink) !important; box-shadow: 0 0 20px rgba(255, 183, 178, 0.4) !important; transform: scale(0.95); }

        @media (max-width: 600px) {
            .grid { grid-template-columns: repeat(2, 1fr) !important; gap: 12px !important; padding: 12px !important; }
            .t-btn { padding: 10px 15px; font-size: 11px; }
            .nav { padding: 15px 10px; gap: 8px; }
            .card { border-radius: 12px; }
            .card span { padding: 10px 8px; font-size: 10px; }
        }
    </style>
</head>
<body>

    <div class="nav">
        <button class="t-btn active" onclick="tab('mangas',this)">📚 Mis Mangas</button>
        <button class="t-btn" onclick="tab('galeria',this)">🖼️ Galería</button>
        <button class="t-btn" onclick="tab('animes',this)">📺 Animes</button>
    </div>

    <div id="t-mangas">
        <div class="f-bar">
            <input type="text" placeholder="Buscar manga..." oninput="loadMangas(this.value)">
        </div>
        <div id="m-grid" class="grid"></div>
    </div>

    <div id="t-galeria" class="hidden">
        <div class="f-bar">
            <input type="text" id="gSearch" placeholder="Buscar ilustraciones..." oninput="renderAlbums(this.value)">
            <div class="cat-row" id="catFilters">
                <button class="c-btn active" onclick="filterCat('TODOS', this)">Todos</button>
                <button class="c-btn" onclick="filterCat('Anime_Manga', this)">Anime/Manga</button>
                <button class="c-btn" onclick="filterCat('Juegos', this)">Juegos</button>
                <button class="c-btn" onclick="filterCat('Comic', this)">Comic</button>
                <button class="c-btn" onclick="filterCat('Real', this)">Real</button>
                <button class="c-btn" onclick="filterCat('Variados', this)">Variados</button>
            </div>
        </div>
        <div class="fab-container" id="g-fabs">
            <button class="fab" style="background:var(--pastel-pink);" onclick="openM()" id="viewBtn">👁️ Ver (0)</button>
            <button class="fab" style="background:var(--pastel-green);" onclick="clearSel()">🧹 Limpiar</button>
        </div>
        <div id="g-grid" class="grid"></div>
    </div>

    <div id="t-animes" class="hidden">
        <div class="f-bar"><input type="text" placeholder="Buscar anime..." oninput="searchGeneric(this.value, 'a-grid')"></div>
        <div id="a-grid" class="grid"></div>
    </div>

    <div id="modal" onclick="if(event.target===this) closeM()">
        <button style="position:absolute; top:25px; right:25px; background:var(--glass-bg); border:1px solid var(--glass-border); border-radius:50%; width:45px; height:45px; color:white; font-size:20px; cursor:pointer; backdrop-filter:blur(5px);" onclick="closeM()">✕</button>
        <img id="m-img" src="">
        <div class="m-nav">
            <button class="t-btn" onclick="changeM(-1)">❮</button>
            <button class="t-btn" onclick="changeM(1)">❯</button>
        </div>
    </div>

    <script src="lista_mangas.js"></script>
    <script src="lista_imagenes.js"></script>
    <script src="lista_animes.js"></script> 
    <script>
    let db = [], selectedDB = new Map(), curIdx = 0, activeCat = 'TODOS';

    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

    /* --- MOTOR DE CARGA (Nativo) --- */
    function createLazyImg(src, alt) {
        const img = document.createElement('img');
        img.loading = 'lazy'; 
        img.src = src;
        img.alt = alt || '';
        return img;
    }

    /* --- GESTIÓN DE TABS --- */
    function tab(t, b) {
        document.getElementById('t-mangas').classList.toggle('hidden', t !== 'mangas');
        document.getElementById('t-galeria').classList.toggle('hidden', t !== 'galeria');
        document.getElementById('t-animes').classList.toggle('hidden', t !== 'animes');
        document.getElementById('g-fabs').style.display = (t === 'galeria') ? 'flex' : 'none';
        document.querySelectorAll('.nav .t-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        if (t === 'galeria' && db.length === 0) loadG();
        if (t === 'animes') loadAnimes();
    }

    /* --- MANGAS --- */
    function loadMangas(filter = "") {
        const grid = document.getElementById('m-grid');
        grid.innerHTML = '';
        if (typeof bibliotecaMangas === 'undefined') return;

        const fragment = document.createDocumentFragment();
        const seriesMap = {};

        Object.keys(bibliotecaMangas).forEach(key => {
            const baseName = key.split(/_ch|_Vol/i)[0].replace(/_/g, ' ');
            const isSub = key.includes('_ch') || key.includes('_Vol');
            if (!seriesMap[baseName]) {
                seriesMap[baseName] = { nombre: baseName, caps: [], portada: bibliotecaMangas[key][0] };
            }
            seriesMap[baseName].caps.push({ key, label: isSub ? `Cap ${key.split(/_ch|_Vol/i)[1]}` : "Completo" });
        });

        Object.values(seriesMap).sort((a,b) => a.nombre.localeCompare(b.nombre)).forEach(serie => {
            if (filter && !serie.nombre.toLowerCase().includes(filter.toLowerCase())) return;
            const card = document.createElement('div');
            card.className = 'card';
            const hasMultiple = serie.caps.length > 1;
            
            card.innerHTML = hasMultiple ? `<div class="badge manga-badge">${serie.caps.length} Caps</div>` : '';
            card.appendChild(createLazyImg(serie.portada, serie.nombre));
            card.innerHTML += `<span>${serie.nombre}</span>`;
            
            card.onclick = () => {
                if (hasMultiple) renderExpandedSerie(serie);
                else window.location.href = `reader.html?manga=${serie.caps[0].key}`;
            };
            fragment.appendChild(card);
        });
        grid.appendChild(fragment);
    }

    function renderExpandedSerie(serie) {
        const grid = document.getElementById('m-grid');
        grid.innerHTML = `<div class="card anime-card" style="grid-column: 1/-1; min-height: 60px; background: rgba(168,230,207,0.1); border-color: var(--pastel-green); color: var(--pastel-green);" onclick="loadMangas()"><span>⬅ Volver a Biblioteca</span></div>`;
        const fragment = document.createDocumentFragment();
        serie.caps.sort((a,b) => a.label.localeCompare(b.label, undefined, {numeric: true})).forEach(cap => {
            const card = document.createElement('div');
            card.className = 'card';
            card.appendChild(createLazyImg(bibliotecaMangas[cap.key][0], serie.nombre));
            card.innerHTML += `<span>${serie.nombre} - ${cap.label}</span>`;
            card.onclick = () => window.location.href = `reader.html?manga=${cap.key}`;
            fragment.appendChild(card);
        });
        grid.appendChild(fragment);
        window.scrollTo(0,0);
    }

    /* --- GALERÍA --- */
    function loadG() {
        db = [];
        if (typeof galeria_maestra === 'undefined') return;
        for (let [cat, pers] of Object.entries(galeria_maestra)) {
            for (let [nom, links] of Object.entries(pers)) {
                links.forEach(url => db.push({ r: url, p: nom, sub: cat, g: nom }));
            }
        }
        renderAlbums();
    }

    function filterCat(cat, btn) {
        activeCat = cat;
        document.querySelectorAll('.c-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderAlbums(document.getElementById('gSearch').value);
    }

    function renderAlbums(filter = "") {
        const grid = document.getElementById('g-grid');
        grid.innerHTML = '';
        const fragment = document.createDocumentFragment();
        const groups = [...new Set(db.map(i => i.g))].sort();

        groups.forEach(g => {
            const data = db.filter(i => i.g === g);
            const item = data[0];
            if (filter && !item.p.toLowerCase().includes(filter.toLowerCase().replace(/ /g, '_'))) return;
            if (activeCat !== 'TODOS' && item.sub !== activeCat) return;

            const card = document.createElement('div');
            if (item.sub === 'Real') {
                card.className = 'card' + (selectedDB.has(item.r) ? ' selected' : '');
                card.appendChild(createLazyImg(item.r, item.p));
                card.innerHTML += `<span>${item.p.replace(/_/g, ' ')}</span>`;
                card.onclick = () => toggleSelection(item, card);
            } else {
                card.className = 'card album-card';
                card.style.backgroundImage = `url('${item.r}')`;
                card.innerHTML = `<div class="badge">${data.length} fotos</div><span>${item.p.replace(/_/g, ' ')}</span>`;
                card.onclick = () => renderImages(g);
            }
            fragment.appendChild(card);
        });
        grid.appendChild(fragment);
    }

    function renderImages(g) {
        const grid = document.getElementById('g-grid');
        grid.innerHTML = `<div class="card anime-card" style="grid-column: 1/-1; min-height: 60px; background: rgba(255,183,178,0.1); border-color: var(--pastel-pink); color: var(--pastel-pink);" onclick="renderAlbums()"><span>⬅ Volver</span></div>`;
        const fragment = document.createDocumentFragment();
        db.filter(i => i.g === g).forEach(item => {
            const card = document.createElement('div');
            card.className = 'card' + (selectedDB.has(item.r) ? ' selected' : '');
            card.appendChild(createLazyImg(item.r, item.p));
            card.innerHTML += `<span>${item.p.replace(/_/g, ' ')}</span>`;
            card.onclick = () => toggleSelection(item, card);
            fragment.appendChild(card);
        });
        grid.appendChild(fragment);
        window.scrollTo(0,0);
    }

    /* --- RESTO DE FUNCIONES --- */
    function toggleSelection(item, card) {
        if (selectedDB.has(item.r)) { selectedDB.delete(item.r); card.classList.remove('selected'); }
        else { selectedDB.set(item.r, item); card.classList.add('selected'); }
        document.getElementById('viewBtn').innerText = `👁️ Ver (${selectedDB.size})`;
    }

    function loadAnimes() {
        const container = document.getElementById('a-grid');
        if (container.children.length > 0 || typeof lista_animes === 'undefined') return;
        Object.entries(lista_animes).sort().forEach(([n, url]) => {
            const a = document.createElement('a');
            a.className = 'card anime-card'; a.href = url; a.target = '_blank';
            a.innerHTML = `<span>${n.replace(/_/g, ' ')}</span>`;
            container.appendChild(a);
        });
    }

    function openM() { 
        if(selectedDB.size === 0) return;
        curIdx = 0; document.getElementById('modal').style.display = 'flex'; updM(); 
    }
    function closeM() { document.getElementById('modal').style.display = 'none'; }
    function updM() { document.getElementById('m-img').src = Array.from(selectedDB.values())[curIdx].r; }
    function changeM(d) { const s = selectedDB.size; curIdx = (curIdx + d + s) % s; updM(); }
    function clearSel() { selectedDB.clear(); renderAlbums(); document.getElementById('viewBtn').innerText = `👁️ Ver (0)`; }

    function searchGeneric(q, id) {
        const container = document.getElementById(id);
        Array.from(container.querySelectorAll('.card')).forEach(c => c.classList.toggle('hidden', !c.innerText.toLowerCase().includes(q.toLowerCase())));
    }

    window.onload = () => loadMangas();
    </script>
</body>
</html>
