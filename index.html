<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="preconnect" href="https://imgchest.com">
    <link rel="dns-prefetch" href="https://imgchest.com">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Library Pro - Mobile Optimized</title>
    <style>
        :root { --bg: #0a0a0a; --acc: #4caf50; --pink: #d81b60; --blue: #2196f3; --gray: #222; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin:0; font-family: 'Segoe UI', sans-serif; background:var(--bg); color:white; overflow-x:hidden; }
        
        /* Nav Principal */
        .nav { display:flex; justify-content:center; gap:10px; padding:15px; position: sticky; top: 0; background: #0a0a0a; z-index: 1000; border-bottom: 1px solid #222; }
        .t-btn { background:#1a1a1a; color:#aaa; border:1px solid #333; padding:10px 20px; border-radius:25px; cursor:pointer; transition:0.2s; font-size: 13px; font-weight: bold; }
        .t-btn.active { background:var(--acc); border-color:var(--acc); color: white; }

        /* Barra de Filtros */
        .f-bar { background:#141414; margin:10px auto; padding:12px; border-radius:10px; max-width:1400px; border:1px solid #333; display: flex; flex-direction: column; gap: 10px; }
        .cat-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .c-btn { background: #1a1a1a; color: #aaa; border: 1px solid #333; padding: 7px 15px; border-radius: 20px; cursor: pointer; white-space: nowrap; font-size: 11px; }
        .c-btn.active { background: var(--blue); color: white; }

        /* Grid Optimizado */
        .grid { 
            display:grid; gap:10px; padding:10px; 
            grid-template-columns:repeat(auto-fill, minmax(160px, 1fr)); 
            max-width: 1600px; margin: 0 auto;
            contain: content;
        }
        
        /* Cards Mobile-Ready */
        .card { 
            background:#161616; border:1px solid #333; border-radius:8px; 
            overflow:hidden; text-align:center; position: relative; 
            display: flex; flex-direction: column;
            content-visibility: auto; 
            contain-intrinsic-size: 160px 240px;
            transform: translateZ(0); /* Aceleración GPU */
        }
        
        .card img { 
            width:100%; 
            aspect-ratio: 3 / 4; 
            object-fit:cover; 
            display:block; 
            background: #111;
            transition: opacity 0.2s;
        }
        
        .img-loading { opacity: 0; }
        .img-loaded { opacity: 1; }

        .card span { display:block; padding:8px; font-size:11px; font-weight: bold; background: #161616; border-top: 1px solid #222; }

        /* Álbumes */
        .album-card { height: 220px; justify-content: flex-end; background-size: cover; background-position: center; }
        .badge { position: absolute; top: 8px; right: 8px; background: var(--blue); color: white; padding: 3px 8px; border-radius: 10px; font-size: 9px; font-weight: bold; z-index: 2; }
        .album-title { background: rgba(0,0,0,0.8); padding: 8px; border-top: 1px solid var(--acc); font-size: 11px; font-weight: bold; width: 100%; }

        /* Fabs */
        .fab-container { position: fixed; bottom: 20px; right: 20px; display: none; flex-direction: column; gap: 10px; z-index: 2000; }
        .fab { border: none; padding: 12px 20px; border-radius: 25px; color: white; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }

        /* Modal */
        #modal { position:fixed; top:0; left:0; width:100%; height:100%; background:#000; display:none; flex-direction:column; align-items:center; justify-content:center; z-index:5000; }
        #modal img { max-width:100%; max-height:90vh; object-fit:contain; }

        .hidden { display:none !important; }
        .selected { border: 2px solid var(--pink) !important; }

        @media (max-width: 600px) {
            .grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
            .nav { padding: 10px; gap: 5px; }
            .t-btn { padding: 8px 12px; font-size: 11px; }
        }
    </style>
</head>
<body>

    <div class="nav">
        <button class="t-btn active" onclick="tab('mangas',this)">📚 Mangas</button>
        <button class="t-btn" onclick="tab('galeria',this)">🖼️ Galería</button>
        <button class="t-btn" onclick="tab('animes',this)">📺 Animes</button>
    </div>

    <div id="t-mangas">
        <div class="f-bar">
            <input type="text" placeholder="Buscar manga..." style="width:100%; padding:10px; background:#111; color:white; border:1px solid #333; border-radius:8px;" oninput="debouncedSearch(this.value, 'mangas')">
        </div>
        <div id="m-grid" class="grid"></div>
    </div>

    <div id="t-galeria" class="hidden">
        <div class="f-bar">
            <input type="text" id="gSearch" placeholder="Buscar..." style="width:100%; padding:10px; background:#111; color:white; border:1px solid #333; border-radius:8px;" oninput="debouncedSearch(this.value, 'galeria')">
            <div class="cat-row">
                <button class="c-btn active" onclick="filterCat('TODOS', this)">Todos</button>
                <button class="c-btn" onclick="filterCat('Anime_Manga', this)">Anime</button>
                <button class="c-btn" onclick="filterCat('Juegos', this)">Juegos</button>
                <button class="c-btn" onclick="filterCat('Real', this)">Real</button>
            </div>
        </div>
        <div id="g-grid" class="grid"></div>
        <div class="fab-container" id="g-fabs">
            <button class="fab" style="background:var(--pink);" onclick="openM()" id="viewBtn">👁️ Ver (0)</button>
        </div>
    </div>

    <div id="t-animes" class="hidden">
        <div class="f-bar"><input type="text" placeholder="Buscar anime..." style="width:100%; padding:10px; background:#111; color:white; border:1px solid #333; border-radius:8px;" oninput="searchGeneric(this.value, 'a-grid')"></div>
        <div id="a-grid" class="grid"></div>
    </div>

    <div id="modal" onclick="if(event.target===this) closeM()">
        <img id="m-img" src="">
        <div style="position:absolute; bottom:20px; display:flex; gap:20px;">
            <button class="t-btn" onclick="changeM(-1)">❮</button>
            <button class="t-btn" onclick="closeM()">Cerrar</button>
            <button class="t-btn" onclick="changeM(1)">❯</button>
        </div>
    </div>

    <script src="lista_mangas.js"></script>
    <script src="lista_imagenes.js"></script>
    <script src="lista_animes.js"></script> 
    <script>
    let db = [], selectedDB = new Map(), curIdx = 0, activeCat = 'TODOS';
    let fullItems = [], itemsLoaded = 0, currentSearch = "";
    const CHUNK_SIZE = 24;

    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

    /* --- MOTOR DE CARGA --- */
    const imageObserver = new IntersectionObserver((entries, observer) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                const img = entry.target;
                if(img.dataset.src) {
                    img.src = img.dataset.src;
                    img.onload = () => img.classList.add('img-loaded');
                }
                observer.unobserve(img);
            }
        });
    }, { rootMargin: '400px' });

    /* --- DELEGACIÓN DE CLIC --- */
    document.addEventListener('click', (e) => {
        const card = e.target.closest('.card');
        if (!card) return;
        const id = card.dataset.id;
        const type = card.dataset.type;

        if (type === 'manga_serie') { renderExpandedSerie(JSON.parse(card.dataset.extra)); }
        else if (type === 'album') { history.pushState({view: 'images'}, ""); renderImages(id); }
        else if (type === 'image' || type === 'manga_cap') {
            if (type === 'manga_cap') window.location.href = card.dataset.link;
            else toggleSelection({r: card.dataset.link, p: id}, card);
        }
    }, { passive: true });

    /* --- RENDERIZADO POR LOTES (La clave para móviles) --- */
    window.onscroll = () => {
        if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 800) {
            renderMore();
        }
    };

    function renderMore() {
        if (itemsLoaded >= fullItems.length) return;
        const gridId = document.getElementById('t-mangas').classList.contains('hidden') ? 'g-grid' : 'm-grid';
        const grid = document.getElementById(gridId);
        const fragment = document.createDocumentFragment();
        
        const nextBatch = fullItems.slice(itemsLoaded, itemsLoaded + CHUNK_SIZE);
        nextBatch.forEach(item => fragment.appendChild(createCard(item)));
        
        grid.appendChild(fragment);
        itemsLoaded += CHUNK_SIZE;
    }

    function createCard(item) {
        const card = document.createElement('div');
        card.className = 'card';
        if(item.type === 'album') {
            card.className += ' album-card';
            card.style.backgroundImage = `url('${item.r}')`;
            card.dataset.type = 'album';
            card.dataset.id = item.g;
            card.innerHTML = `<div class="badge">${item.count} fotos</div><div class="album-title">${item.p.replace(/_/g, ' ')}</div>`;
        } else {
            card.dataset.type = item.type;
            card.dataset.id = item.p;
            card.dataset.link = item.link || item.r;
            if(item.extra) card.dataset.extra = item.extra;
            if(selectedDB.has(item.r)) card.classList.add('selected');
            
            const img = document.createElement('img');
            img.className = 'img-loading';
            img.dataset.src = item.r;
            img.src = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lMREFUeNoFwQEBAAAAgl0A/gl1UwVNAAACR0lEQVR42mP8/x8AAwMCAO+ip1sAAAAASUVORK5CYII=";
            
            card.appendChild(img);
            card.innerHTML += `<span>${(item.nombre || item.p).replace(/_/g, ' ')}</span>`;
            imageObserver.observe(img);
        }
        return card;
    }

    /* --- LÓGICA DE SECCIONES --- */
    function tab(t, b) {
        document.querySelectorAll('.t-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        document.getElementById('t-mangas').classList.toggle('hidden', t !== 'mangas');
        document.getElementById('t-galeria').classList.toggle('hidden', t !== 'galeria');
        document.getElementById('t-animes').classList.toggle('hidden', t !== 'animes');
        document.getElementById('g-fabs').style.display = (t === 'galeria') ? 'flex' : 'none';
        if (t === 'galeria' && db.length === 0) loadG();
        else if (t === 'animes') loadAnimes();
        else if (t === 'mangas') loadMangas();
    }

    function loadMangas(filter = "") {
        fullItems = []; itemsLoaded = 0;
        document.getElementById('m-grid').innerHTML = '';
        const seriesMap = {};
        Object.keys(bibliotecaMangas).forEach(key => {
            const baseName = key.split(/_ch|_Vol/i)[0].replace(/_/g, ' ');
            if (!seriesMap[baseName]) seriesMap[baseName] = { nombre: baseName, caps: [], r: bibliotecaMangas[key][0] };
            seriesMap[baseName].caps.push(key);
        });
        
        fullItems = Object.values(seriesMap)
            .filter(s => s.nombre.toLowerCase().includes(filter.toLowerCase()))
            .map(s => ({
                ...s, 
                type: s.caps.length > 1 ? 'manga_serie' : 'manga_cap',
                link: `reader.html?manga=${s.caps[0]}`,
                extra: s.caps.length > 1 ? JSON.stringify(s) : null
            }));
        renderMore();
    }

    function loadG() {
        db = [];
        for (let [cat, pers] of Object.entries(galeria_maestra)) {
            for (let [nom, links] of Object.entries(pers)) {
                links.forEach(url => db.push({ r: url, p: nom, sub: cat, g: nom }));
            }
        }
        renderAlbums();
    }

    function renderAlbums(filter = "") {
        fullItems = []; itemsLoaded = 0;
        document.getElementById('g-grid').innerHTML = '';
        const groups = [...new Set(db.map(i => i.g))];
        fullItems = groups.map(g => {
            const data = db.filter(i => i.g === g);
            return { ...data[0], count: data.length, type: data[0].sub === 'Real' ? 'image' : 'album' };
        }).filter(i => i.p.toLowerCase().includes(filter.toLowerCase().replace(/ /g, '_')) && (activeCat === 'TODOS' || i.sub === activeCat));
        renderMore();
    }

    function renderImages(g) {
        fullItems = db.filter(i => i.g === g).map(i => ({...i, type: 'image'}));
        itemsLoaded = 0;
        document.getElementById('g-grid').innerHTML = '<div class="card" style="height:60px; background:var(--pink); align-items:center; justify-content:center; grid-column:1/-1" onclick="history.back()">⬅ Volver</div>';
        renderMore();
    }

    /* --- UTILIDADES --- */
    let searchT;
    function debouncedSearch(v, type) {
        clearTimeout(searchT);
        searchT = setTimeout(() => { if(type==='mangas') loadMangas(v); else renderAlbums(v); }, 300);
    }

    function filterCat(c, b) {
        activeCat = c;
        document.querySelectorAll('.c-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        renderAlbums(document.getElementById('gSearch').value);
    }

    function toggleSelection(item, card) {
        if (selectedDB.has(item.r)) { selectedDB.delete(item.r); card.classList.remove('selected'); }
        else { selectedDB.set(item.r, item); card.classList.add('selected'); }
        document.getElementById('viewBtn').innerText = `👁️ Ver (${selectedDB.size})`;
    }

    function openM() { 
        if(selectedDB.size === 0) return; curIdx = 0; 
        document.getElementById('modal').style.display = 'flex'; 
        document.getElementById('m-img').src = Array.from(selectedDB.values())[0].r;
    }
    function closeM() { document.getElementById('modal').style.display = 'none'; }
    function changeM(d) {
        const arr = Array.from(selectedDB.values());
        curIdx = (curIdx + d + arr.length) % arr.length;
        document.getElementById('m-img').src = arr[curIdx].r;
    }

    window.onload = loadMangas;
    </script>
</body>
</html>
