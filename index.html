<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><title>My Library Pro</title>
    <style>
        :root { --bg: #0a0a0a; --acc: #4caf50; --sc: 1; }
        body { margin:0; font-family:sans-serif; background:var(--bg); color:white; overflow-x:hidden; }
        .nav { display:flex; justify-content:center; gap:10px; padding:20px; position: sticky; top: 0; background: var(--bg); z-index: 100; }
        .t-btn { background:#222; color:white; border:1px solid #444; padding:8px 20px; border-radius:20px; cursor:pointer; transition:0.2s; }
        .t-btn.active { background:var(--acc); border-color:var(--acc); }
        .f-bar { background:rgba(20,20,20,0.95); margin:10px auto; padding:15px; border-radius:12px; max-width:1400px; border:1px solid #333; }
        .grid { display:grid; gap:15px; padding:20px; grid-template-columns:repeat(auto-fill, minmax(220px, 1fr)); }
        
        /* Estilos de la Card y Selección */
        .card { background:#161616; border:1px solid #333; border-radius:10px; text-decoration:none; color:white; overflow:hidden; text-align:center; transition:0.2s; position: relative; cursor: pointer; }
        .card:hover { border-color:var(--acc); transform: translateY(-5px); }
        .card.selected { border: 3px solid var(--acc); background: rgba(76, 175, 80, 0.1); }
        .card.selected::after { content: '✅'; position: absolute; top: 8px; right: 8px; font-size: 18px; background: rgba(0,0,0,0.6); border-radius: 50%; padding: 2px; }
        
        .card img { width:100%; height:280px; object-fit:cover; display:block; background: #222; }
        .card span { display:block; padding:10px; font-size:13px; font-weight: bold; }
        
        .futa-sep { grid-column:1/-1; color:var(--acc); text-align:center; border-top:1px dashed #333; padding:15px; font-weight:bold; letter-spacing: 2px; }
        .hidden { display:none !important; }
        .f-group { display:flex; flex-wrap:wrap; gap:5px; margin-top:10px; }
        
        .stats { font-size: 12px; color: var(--acc); margin-bottom: 10px; font-weight: bold; }
        .btn-view { background: #d81b60 !important; border-color: #d81b60 !important; }

        /* Estilos Carrusel */
        #modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:5000; }
        #modal img { max-width:95%; max-height:85vh; object-fit:contain; border:1px solid #444; }
        .m-nav { position:absolute; top:50%; width:100%; display:flex; justify-content:space-between; padding:0 30px; box-sizing:border-box; pointer-events:none; }
        .m-btn { background:rgba(255,255,255,0.1); color:white; border:none; padding:20px; cursor:pointer; pointer-events:auto; font-size:24px; border-radius:50%; }
        .m-btn:hover { background:var(--acc); }
        .m-close { position:absolute; top:20px; right:20px; background:none; border:none; color:white; font-size:30px; cursor:pointer; }
    </style>
</head>
<body>

    <div class="nav">
        <button class="t-btn" id="btn-mangas" onclick="tab('mangas',this)">📚 Mis Mangas</button>
        <button class="t-btn" id="btn-galeria" onclick="tab('galeria',this)">🖼️ Ilustraciones</button>
    </div>

    <div id="t-mangas" class="hidden">
        <div class="f-bar"><input type="text" id="mSearch" placeholder="Buscar manga..." style="width:100%; padding:10px; background:#111; color:white; border:1px solid #333; border-radius:8px;" oninput="searchM(this.value)"></div>
        <div id="m-grid" class="grid">
            <a class="card" href="reader.html?manga=Francis_X_Raikou"><span>Francis X Raikou</span></a>
            <a class="card" href="reader.html?manga=Yang_Gui_Fei_X_Prota"><span>Yang Gui Fei X Prota</span></a>
            <a class="card" href="reader.html?manga=Ibuki_X_Yui"><span>Ibuki X Yui</span></a>
            <a class="card" href="reader.html?manga=BB_X_Prota"><span>BB X Prota</span></a>
            <a class="card" href="reader.html?manga=Jalter_X_Apocrypha_NPC"><span>Jalter X Apocrypha NPC</span></a>
            
            <div class="futa-sep">FUTANARIJIMA</div>
            <a class="card" href="reader.html?manga=Futanarijima_ch1"><span>Capítulo 1</span></a>
            <a class="card" href="reader.html?manga=Futanarijima_ch2"><span>Capítulo 2</span></a>
            <a class="card" href="reader.html?manga=Futanarijima_ch3"><span>Capítulo 3</span></a>
            <a class="card" href="reader.html?manga=Futanarijima_ch4"><span>Capítulo 4</span></a>
            <a class="card" href="reader.html?manga=Futanarijima_ch5"><span>Capítulo 5</span></a>
            <a class="card" href="reader.html?manga=Futanarijima_ch6"><span>Capítulo 6</span></a>
        </div>
    </div>

    <div id="t-galeria" class="hidden">
        <div class="f-bar">
            <div class="stats" id="g-stats">Seleccionadas: 0 / Mostrando: 0</div>
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <input type="text" id="gSearch" placeholder="Buscar personaje..." style="flex-grow:1; padding:10px; background:#111; color:white; border:1px solid #333; border-radius:8px;" oninput="filtG()">
                <button class="t-btn btn-view" onclick="openM()">👁️ Ver Selección</button>
                <button class="t-btn" onclick="clearSel()">🧹 Limpiar Selección</button>
            </div>
            <div id="cats" class="f-group"></div>
            <div id="pjs" class="f-group"></div>
        </div>
        <div id="g-grid" class="grid"></div>
    </div>

    <div id="modal" onclick="if(event.target===this) closeM()">
        <button class="m-close" onclick="closeM()">✕</button>
        <img id="m-img" src="">
        <div id="m-name" style="margin-top:15px; font-weight:bold;"></div>
        <div class="m-nav">
            <button class="m-btn" onclick="changeM(-1)">❮</button>
            <button class="m-btn" onclick="changeM(1)">❯</button>
        </div>
    </div>

    <script src="lista_imagenes.js"></script>
    <script>
    let db = [], selectedDB = [], fCat = 'Todos', fPj = 'Todos', curIdx = 0;

    function tab(t, b) {
        document.getElementById('t-mangas').classList.toggle('hidden', t !== 'mangas');
        document.getElementById('t-galeria').classList.toggle('hidden', t !== 'galeria');
        document.querySelectorAll('.nav .t-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        if (t === 'galeria' && db.length === 0) loadG();
    }

    function loadG() {
        const proc = (o, c) => { 
            if (!o) return; 
            let realCounter = 1; // Contador para imágenes realistas
            for (let [p, l] of Object.entries(o)) {
                l.forEach(r => {
                    let name;
                    if (c === "Realista") {
                        name = `Real ${realCounter++}`;
                    } else {
                        name = p.split(/[ _]/)[0];
                    }
                    db.push({ r, p: name, c });
                });
            }
        };
        proc(lista_ilustraciones, "Ilustraciones"); 
        proc(lista_real, "Realista"); 
        proc(lista_rule34, "Rule34");
        renderF(); 
        filtG();
    }

    function renderF() {
        const gen = (id, l, cur, type) => {
            const d = document.getElementById(id); d.innerHTML = '';
            
            // Filtramos "Todos" de la lista de personajes (type === 'p')
            const items = type === 'p' ? l.filter(x => x !== 'Todos') : l;

            items.forEach(x => {
                const b = document.createElement('button'); 
                b.innerText = x;
                b.className = 't-btn' + (x === cur ? ' active' : ''); 
                b.style.fontSize = '10px';
                
                b.onclick = () => { 
                    if (type === 'c') {
                        fCat = x;
                    } else {
                        // Lógica de deselección: si clicamos el mismo, volvemos a 'Todos'
                        fPj = (fPj === x) ? 'Todos' : x;
                    }
                    renderF(); 
                    filtG(); 
                };
                d.appendChild(b);
            });
        };

        gen('cats', ['Todos', ...new Set(db.map(i => i.c))], fCat, 'c');
        
        // Excluimos "Futa" de la lista de personajes si viene de Realista
        const pjsUnicos = [...new Set(db.map(i => i.p))].filter(p => p !== "Futa").sort();
        gen('pjs', ['Todos', ...pjsUnicos], fPj, 'p');
    }

    function filtG() {
        const q = document.getElementById('gSearch').value.toLowerCase();
        const g = document.getElementById('g-grid'); g.innerHTML = '';
        
        const filtered = db.filter(i => 
            (fCat === 'Todos' || i.c === fCat) && 
            (fPj === 'Todos' || i.p === fPj) && 
            (i.p.toLowerCase().includes(q))
        );

        filtered.forEach(i => {
            const c = document.createElement('div');
            const isSel = selectedDB.some(s => s.r === i.r);
            c.className = 'card' + (isSel ? ' selected' : '');
            c.onclick = () => toggleSel(i, c);
            c.innerHTML = `<img src="${i.r}" loading="lazy"><span>${i.p}</span>`;
            g.appendChild(c);
        });

        document.getElementById('g-stats').innerText = `Seleccionadas: ${selectedDB.length} / Mostrando: ${filtered.length}`;
    }

    function toggleSel(item, el) {
        const idx = selectedDB.findIndex(s => s.r === item.r);
        if (idx > -1) {
            selectedDB.splice(idx, 1);
            el.classList.remove('selected');
        } else {
            selectedDB.push(item);
            el.classList.add('selected');
        }
        document.getElementById('g-stats').innerText = `Seleccionadas: ${selectedDB.length} / Mostrando: ${document.querySelectorAll('#g-grid .card').length}`;
    }

    function clearSel() {
        selectedDB = [];
        filtG();
    }

    function openM() {
        if (selectedDB.length === 0) return alert("Selecciona algunas imágenes primero");
        curIdx = 0;
        document.getElementById('modal').style.display = 'flex';
        updM();
    }

    function closeM() { document.getElementById('modal').style.display = 'none'; }
    
    function updM() {
        const i = selectedDB[curIdx];
        document.getElementById('m-img').src = i.r;
        document.getElementById('m-name').innerText = `(${curIdx + 1}/${selectedDB.length}) ${i.p} [${i.c}]`;
    }

    function changeM(d) {
        curIdx = (curIdx + d + selectedDB.length) % selectedDB.length;
        updM();
    }

    function searchM(q) {
        document.querySelectorAll('#m-grid .card').forEach(c => {
            c.classList.toggle('hidden', !c.innerText.toLowerCase().includes(q.toLowerCase()));
        });
    }

    window.onload = () => tab('mangas', document.getElementById('btn-mangas'));
</script>
</body>
</html>
