<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><title>Reader Pro</title>
    <style>
        body { margin:0; background:#000; color:white; font-family:sans-serif; overflow-x:hidden; }
        #reader { display:flex; flex-direction:column; align-items:center; width:100%; transition: 0.3s; }
        .page { width:100%; max-width:850px; margin-bottom:10px; display: block; transition: 0.2s; }
        
        /* MODOS */
        .fit-mode .page { max-width: 100vw !important; width: 100% !important; margin-bottom: 0; border-radius: 0; }
        .double-mode { flex-direction: row !important; flex-wrap: wrap; justify-content: center; }
        .double-mode .page { width: 50% !important; max-width: 50vw !important; margin-bottom: 0; }

        /* UI */
        #sideBar { position:fixed; right:15px; top:50%; transform:translateY(-50%); background:rgba(0,0,0,0.9); border:1px solid #333; border-radius:12px; padding:15px 10px; display:flex; flex-direction:column; gap:8px; z-index:3000; width:105px; border: 1px solid #4caf50; }
        .p-btn { background:#1a1a1a; color:white; border:1px solid #333; padding:8px; border-radius:5px; cursor:pointer; font-size:12px; font-weight:bold; }
        .p-btn:hover { border-color:#4caf50; background:#222; }
        #progressBar { position:fixed; top:0; left:0; height:4px; background:#4caf50; width:0%; z-index:4000; }
        #info { font-size:11px; text-align:center; margin-bottom:5px; color:#4caf50; font-weight:bold; }
        .hidden-ui { display:none !important; }
        #btnShow { position:fixed; right:10px; top:10px; background:rgba(0,0,0,0.7); border:1px solid #4caf50; color:white; padding:10px; border-radius:50%; cursor:pointer; z-index:3001; display:none; }
    </style>
</head>
<body>

<div id="progressBar"></div>
<button id="btnShow" onclick="toggleUI()">👁️</button>

<div id="sideBar">
    <div id="info">Cargando...</div>
    <button class="p-btn" onclick="window.scrollTo({top:0, behavior:'smooth'})">⬆️ Arriba</button>
    <button class="p-btn" onclick="window.scrollTo({top:document.body.scrollHeight, behavior:'smooth'})">⬇️ Abajo</button>
    <button class="p-btn" onclick="zm(1.1)">🔍 +</button>
    <button class="p-btn" onclick="zm(0.9)">🔍 -</button>
    <button class="p-btn" onclick="toggleFit()">📐 Fit</button>
    <button class="p-btn" onclick="toggleDouble()">📖 Doble</button>
    <button class="p-btn" onclick="toggleUI()">👁️ Ocultar</button>
    <button class="p-btn" onclick="location.href='index.html'">⬅️ Volver</button>
</div>

<div id="reader"></div>

<script src="lista_mangas.js"></script>
<script>
    const mID = new URLSearchParams(window.location.search).get("manga");
    let zoomW = 850;

    window.onload = () => {
        if (!mID || typeof bibliotecaMangas === 'undefined') return;
        const p = bibliotecaMangas[mID];
        if(!p) return;
        document.getElementById("info").innerText = `1 / ${p.length}`;
        p.forEach(url => {
            const img = document.createElement("img");
            img.src = url; img.className = "page";
            document.getElementById("reader").appendChild(img);
        });
    };

    function zm(f) { 
        zoomW *= f; 
        document.getElementById('reader').classList.remove('fit-mode', 'double-mode');
        document.querySelectorAll('.page').forEach(i => i.style.maxWidth = zoomW + "px"); 
    }
    
    function toggleFit() { 
        document.getElementById('reader').classList.remove('double-mode');
        document.getElementById('reader').classList.toggle('fit-mode'); 
    }

    function toggleDouble() { 
        document.getElementById('reader').classList.remove('fit-mode');
        document.getElementById('reader').classList.toggle('double-mode'); 
    }

    function toggleUI() {
        const bar = document.getElementById('sideBar');
        const btn = document.getElementById('btnShow');
        if(bar.style.display === 'none') { bar.style.display = 'flex'; btn.style.display = 'none'; }
        else { bar.style.display = 'none'; btn.style.display = 'block'; }
    }

    window.onscroll = () => {
        let s = document.documentElement.scrollTop, h = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        document.getElementById("progressBar").style.width = (s / h * 100) + "%";
        let p = document.querySelectorAll('.page');
        if(p.length) {
            let cur = Math.round((s / h) * (p.length - 1)) + 1;
            document.getElementById("info").innerText = `${cur || 1} / ${p.length}`;
        }
    };
</script>
</body>
</html>
