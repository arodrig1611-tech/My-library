<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Reader Pro</title>
    <style>
        body { margin: 0; background: #111; font-family: Arial, sans-serif; color: white; }
        #reader { display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .page { width: 100%; max-width: 900px; display: block; margin-bottom: 8px; border-radius: 6px; }
        .fit-width .page { width: 100vw; max-width: none; }
        #progressBar { position: fixed; top: 0; left: 0; height: 5px; background: #4caf50; width: 0%; z-index: 1000; }
        #toolbar { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 10px; display: flex; flex-direction: column; gap: 6px; z-index: 999; }
        button { background: #333; color: white; border: none; padding: 8px; border-radius: 6px; cursor: pointer; }
        #pageInfo { font-size: 12px; text-align: center; margin-bottom: 5px; }
        .error-msg { margin-top: 50px; text-align: center; padding: 20px; }
    </style>
</head>
<body>

<div id="progressBar"></div>
<div id="reader"></div>

<div id="toolbar">
    <div id="pageInfo">Cargando...</div>
    <button onclick="window.scrollTo({top:0, behavior:'smooth'})">⬆️ Top</button>
    <button onclick="window.history.back()">⬅️ Volver</button>
</div>

<script src="lista_mangas.js"></script>

<script>
window.onload = function() {
    const params = new URLSearchParams(window.location.search);
    const mangaID = params.get("manga");
    const readerDiv = document.getElementById("reader");

    // DIAGNÓSTICO
    if (!mangaID) {
        readerDiv.innerHTML = "<div class='error-msg'><h2>❌ Error: No se seleccionó manga</h2><p>El link debe ser ?manga=Nombre</p></div>";
        return;
    }

    if (typeof bibliotecaMangas === 'undefined') {
        readerDiv.innerHTML = "<div class='error-msg'><h2>❌ Error: lista_mangas.js no cargó</h2><p>Verifica que el archivo se llame exactamente así en GitHub.</p></div>";
        return;
    }

    const paginas = bibliotecaMangas[mangaID];

    if (!paginas || paginas.length === 0) {
        readerDiv.innerHTML = `<div class='error-msg'><h2>❌ Error: '${mangaID}' no encontrado</h2><p>Revisa que el nombre coincida exactamente en el JS e Index.</p></div>`;
        return;
    }

    // CARGA DE IMÁGENES
    document.getElementById("pageInfo").innerText = `1 / ${paginas.length}`;
    
    paginas.forEach((link) => {
        const img = document.createElement("img");
        img.src = link;
        img.className = "page";
        img.onerror = () => console.error("Fallo link:", link);
        readerDiv.appendChild(img);
    });

    // BARRA DE PROGRESO
    window.onscroll = function() {
        let winScroll = document.documentElement.scrollTop;
        let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        let scrolled = (winScroll / height) * 100;
        document.getElementById("progressBar").style.width = scrolled + "%";
    };
};
</script>
</body>
</html>
