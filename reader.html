<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reader Pro</title>
    <style>
        body { margin:0; background:#0a0a0a; color:white; font-family:sans-serif; }
        #reader { display:flex; flex-direction:column; align-items:center; }
        .page { width:100%; max-width:800px; margin-bottom:10px; transition: 0.2s; }
        #sideBar { position:fixed; right:15px; top:50%; transform:translateY(-50%); background:#000; border:1px solid #333; border-radius:12px; padding:15px 10px; display:flex; flex-direction:column; gap:8px; z-index:3000; width:100px; }
        .p-btn { background:#1a1a1a; color:white; border:1px solid #333; padding:8px; border-radius:5px; cursor:pointer; font-size:12px; }
        #progressBar { position:fixed; top:0; left:0; height:4px; background:#4caf50; width:0%; z-index:4000; }
    </style>
</head>
<body>

<div id="progressBar"></div>

<div id="sideBar">
    <div id="info" style="font-size:11px; text-align:center; margin-bottom:5px;">0 / 0</div>
    <button class="p-btn" onclick="window.scrollTo(0,0)">⬆️ Arriba</button>
    <button class="p-btn" onclick="window.scrollTo(0,document.body.scrollHeight)">⬇️ Abajo</button>
    <button class="p-btn" onclick="zm(1.1)">🔍 +</button>
    <button class="p-btn" onclick="zm(0.9)">🔍 -</button>
    <button class="p-btn" onclick="location.href='index.html'">⬅️ Volver</button>
</div>

<div id="reader"></div>

<script src="lista_mangas.js"></script>
<script>
    const mID = new URLSearchParams(window.location.search).get("manga");
    let w = 800;

    window.onload = () => {
        if (!mID || typeof bibliotecaMangas === 'undefined') return;
        const p = bibliotecaMangas[mID];
        document.getElementById("info").innerText = `1 / ${p.length}`;
        p.forEach(l => {
            const i = document.createElement("img"); i.src = l; i.className = "page";
            document.getElementById("reader").appendChild(i);
        });
    };

    function zm(f) { w *= f; document.querySelectorAll('.page').forEach(i => i.style.maxWidth = w + "px"); }
    
    window.onscroll = () => {
        let s = document.documentElement.scrollTop;
        let h = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        document.getElementById("progressBar").style.width = (s / h * 100) + "%";
    };
</script>
</body>
</html>
