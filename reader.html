<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reader Pro</title>
    <style>
        body { margin:0; background:#0a0a0a; color:white; font-family:sans-serif; overflow-x:hidden; }
        
        /* Contenedor principal */
        #reader { display:flex; flex-direction:column; align-items:center; width:100%; padding-top:5px; }
        .page { width:100%; max-width:800px; margin-bottom:10px; transition: 0.2s ease-in-out; }
        
        /* Modos de lectura */
        .fit-width { max-width: 100vw !important; width: 100% !important; margin-bottom: 0; }
        
        #reader.double-mode { flex-direction: row; flex-wrap: wrap; justify-content: center; align-items: flex-start; }
        #reader.double-mode .page { width: 50%; max-width: 50vw; margin-bottom: 0; }

        /* Barra de progreso */
        #progressBar { position:fixed; top:0; left:0; height:4px; background:#4caf50; width:0%; z-index:4000; }

        /* SIDEBAR COMPLETO */
        #sideBar { position:fixed; right:15px; top:50%; transform:translateY(-50%); background:#000; border:1px solid #333; border-radius:12px; padding:15px 10px; display:flex; flex-direction:column; gap:8px; z-index:3000; width:105px; transition: right 0.3s; }
        #sideBar.hidden-ui { right: -150px; } /* Lo saca de la pantalla */
        
        /* Botón para mostrar UI cuando está oculta */
        .show-ui-btn { position: fixed; right: 10px; top: 50%; transform: translateY(-50%); background: #1a1a1a; color: white; border: 1px solid #4caf50; padding: 10px; border-radius: 8px; cursor: pointer; z-index: 2999; display: none; font-size: 16px; }
        .show-ui-btn.visible { display: block; }

        .p-btn { background:#1a1a1a; color:white; border:1px solid #333; padding:8px; border-radius:5px; cursor:pointer; font-size:12px; display:flex; align-items:center; gap:5px; justify-content:center; font-weight:bold; }
        .p-btn:hover { border-color:#4caf50; }
        #info { font-size:11px; text-align:center; margin-bottom:5px; font-weight:bold; color:#ccc; }
    </style>
</head>
<body>

<div id="progressBar"></div>

<button id="showUIBtn" class="show-ui-btn" onclick="toggleUI()">👁️</button>

<div id="sideBar">
    <div id="info">Page 1 / 0</div>
    <button class="p-btn" onclick="window.scrollTo({top:0, behavior:'smooth'})">⬆️ Arriba</button>
    <button class="p-btn" onclick="window.scrollTo({top:document.body.scrollHeight, behavior:'smooth'})">⬇️ Abajo</button>
    <button class="p-btn" onclick="zm(1.1)">🔍 +</button>
    <button class="p-btn" onclick="zm(0.9)">🔍 -</button>
    <button class="p-btn" onclick="toggleFit()">📐 Fit</button>
    <button class="p-btn" onclick="toggleDoble()">📖 Doble</button>
    <button class="p-btn" onclick="toggleUI()">👁️ Ocultar UI</button>
    <button class="p-btn" onclick="location.href='index.html'">⬅️ Volver</button>
</div>

<div id="reader"></div>

<script src="lista_mangas.js"></script>
<script>
    const mID = new URLSearchParams(window.location.search).get("manga");
    let w = 800;

    // Carga de imágenes
    window.onload = () => {
        if (!mID || typeof bibliotecaMangas === 'undefined') return;
        const p = bibliotecaMangas[mID];
        document.getElementById("info").innerText = `Page 1 / ${p.length}`;
        p.forEach(l => {
            const i = document.createElement("img"); i.src = l; i.className = "page";
            document.getElementById("reader").appendChild(i);
        });
    };

    // Funciones de Botones
    function zm(f) { 
        w *= f; 
        document.querySelectorAll('.page').forEach(i => {
            i.classList.remove('fit-width'); // Quita el fit si haces zoom manual
            i.style.maxWidth = w + "px";
        }); 
        document.getElementById('reader').classList.remove('double-mode');
    }
    
    function toggleFit() {
        document.getElementById('reader').classList.remove('double-mode');
        document.querySelectorAll('.page').forEach(i => i.classList.toggle('fit-width'));
    }

    function toggleDoble() {
        document.querySelectorAll('.page').forEach(i => i.classList.remove('fit-width'));
        document.getElementById('reader').classList.toggle('double-mode');
    }

    function toggleUI() {
        document.getElementById('sideBar').classList.toggle('hidden-ui');
        document.getElementById('showUIBtn').classList.toggle('visible');
    }

    // Progreso y Contador de páginas al hacer scroll
    window.onscroll = () => {
        let s = document.documentElement.scrollTop;
        let h = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        document.getElementById("progressBar").style.width = (s / h * 100) + "%";
        
        let pages = document.querySelectorAll('.page');
        if(pages.length > 0) {
            let current = Math.round((s / h) * (pages.length - 1)) + 1;
            if(!current) current = 1;
            document.getElementById("info").innerText = `Page ${current} / ${pages.length}`;
        }
    };
</script>
</body>
</html>
