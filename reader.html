<script src="lista_mangas.js"></script> <script>
// 1. OBTENER EL NOMBRE DEL MANGA DESDE LA URL
const params = new URLSearchParams(window.location.search);
const mangaID = params.get("manga") || ""; // Ahora buscamos "?manga="

// 2. BUSCAR LAS PÁGINAS EN NUESTRA LISTA
const paginas = bibliotecaMangas[mangaID];

if (!mangaID || !paginas) {
    document.body.innerHTML = "<h2 style='color:white;text-align:center'>Manga no encontrado o lista vacía</h2>";
} else {
    cargarTodoElManga();
}

// Variables de control
let zoomLevel = 1;
let totalPages = paginas ? paginas.length : 0;

// 3. FUNCIÓN PARA CARGAR LOS LINKS DE CATBOX
function cargarTodoElManga() {
    const reader = document.getElementById("reader");
    
    paginas.forEach((link, index) => {
        let img = new Image();
        img.src = link; // Usa el link directo de Catbox
        img.className = "page";
        img.loading = "lazy"; // Optimiza la carga en el celular
        
        img.onload = function() {
            updatePageInfo();
        };

        img.onerror = function() {
            console.error("Error cargando página:", link);
        };

        reader.appendChild(img);
    });
}

// --- FUNCIONES DE CONTROL (Manteniendo tus botones originales) ---

function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }
function scrollToBottom() { window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }); }

function zoomIn() { zoomLevel += 0.1; updateZoom(); }
function zoomOut() { zoomLevel = Math.max(0.5, zoomLevel - 0.1); updateZoom(); }

function updateZoom() {
    document.querySelectorAll(".page").forEach(img => {
        img.style.transform = `scale(${zoomLevel})`;
    });
}

let fitMode = false;
let doubleMode = false;

function toggleFit() {
    fitMode = !fitMode;
    document.body.classList.toggle("fit-width", fitMode);
}

function toggleDouble() {
    doubleMode = !doubleMode;
    document.body.classList.toggle("double-page", doubleMode);
    const toolbar = document.getElementById("toolbar");
    const showBtn = document.getElementById("showUI");
    if (doubleMode) {
        toolbar.style.display = "none";
        showBtn.style.display = "block";
    } else {
        toolbar.style.display = "flex";
        showBtn.style.display = "none";
    }
}

function toggleUI(forceShow = false) {
    const bar = document.getElementById("toolbar");
    const showBtn = document.getElementById("showUI");
    if (forceShow || bar.style.display === "none") {
        bar.style.display = "flex";
        showBtn.style.display = "none";
    } else {
        bar.style.display = "none";
        showBtn.style.display = "block";
    }
}

function goBack() { window.history.back(); }

function updatePageInfo(current = 1) {
    document.getElementById("pageInfo").innerText = `Page ${current} / ${totalPages}`;
}

// Barra de progreso y contador de página actual al hacer scroll
window.onscroll = function () {
    let winScroll = document.documentElement.scrollTop;
    let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
    let scrolled = (winScroll / height) * 100;
    document.getElementById("progressBar").style.width = scrolled + "%";

    let pages = document.querySelectorAll(".page");
    let current = 1;
    pages.forEach((img, index) => {
        let rect = img.getBoundingClientRect();
        if (rect.top <= window.innerHeight / 2) {
            current = index + 1;
        }
    });
    updatePageInfo(current);
};
</script>
